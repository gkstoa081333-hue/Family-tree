<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>가계도 | 공주시정신건강복지센터</title>
<style>
:root {
  --blue:#2563EB; --blue-lt:#EFF6FF; --blue-dk:#1D4ED8;
  --green:#059669; --red:#EF4444; --amber:#F59E0B;
  --bg:#F1F5F9; --surface:#fff; --border:#E2E8F0; --border2:#CBD5E1;
  --text:#0F172A; --text2:#475569; --text3:#94A3B8;
  --r:10px; --font:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex}

/* ── 사이드바 (웹) / 풀스크린 목록 (모바일) ── */
#sidebar {
  width:var(--sidebar);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
}
#sidebar-hdr {
  background:var(--blue);color:#fff;padding:16px;flex-shrink:0;
}
#sidebar-hdr h1{font-size:15px;font-weight:700}
#sidebar-hdr p{font-size:11px;opacity:.7;margin-top:2px}
#case-list{flex:1;overflow-y:auto;padding:8px}
.case-card{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px;
  border:1px solid transparent;
}
.case-card:hover{background:var(--bg)}
.case-card.active{background:var(--blue-lt);border-color:#BFDBFE}
.case-av{
  width:36px;height:36px;border-radius:50%;background:var(--blue);
  color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.case-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.case-sub{font-size:11px;color:var(--text3)}
#sidebar-add{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.btn-add{
  width:100%;padding:10px;border-radius:8px;border:none;
  background:var(--blue);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-add:hover{background:var(--blue-dk)}
.empty-tip{text-align:center;color:var(--text3);padding:32px 16px;font-size:13px}
.empty-tip .ei{font-size:36px;margin-bottom:8px}

/* ── 메인 영역 ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;height:100dvh;overflow:hidden}

/* ── 헤더 ── */
#main-hdr{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
#mobile-back{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:2px 6px;color:var(--text)}
#hdr-title{font-size:16px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-sub{font-size:12px;color:var(--text3)}
.hdr-btn{
  background:var(--bg);border:1px solid var(--border2);color:var(--text2);
  border-radius:7px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font);white-space:nowrap;
}
.hdr-btn:hover{background:var(--border)}

/* ── 탭 ── */
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.tab{
  padding:10px 20px;font-size:13px;font-weight:600;color:var(--text3);
  border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;
  font-family:var(--font);
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text2)}

/* ── 탭 패널 ── */
.panel{flex:1;display:none;overflow:hidden}
.panel.active{display:flex;flex-direction:column}

/* ── 가계도 패널 ── */
#geno-panel{position:relative}
#canvas-wrap{flex:1;position:relative;background:#F7F9FC;overflow:hidden;touch-action:none}
#geno-canvas{width:100%;height:100%;display:block}

/* 관계 모드 토스트 */
#rel-toast{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:var(--blue);color:#fff;border-radius:20px;
  padding:8px 16px;font-size:13px;font-weight:500;display:none;z-index:30;
  box-shadow:0 4px 16px rgba(0,0,0,.15);text-align:center;white-space:nowrap;pointer-events:none;
}
#rel-toast.show{display:block}
#rel-toast-btn{
  display:none;margin-top:6px;background:rgba(255,255,255,.25);
  border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:12px;
  padding:5px 14px;font-size:12px;font-family:var(--font);cursor:pointer;pointer-events:all;
}
#cancel-rel{
  display:none;position:absolute;top:10px;right:12px;
  background:#fff;border:1px solid var(--border2);border-radius:20px;
  padding:6px 14px;font-size:13px;font-weight:600;color:var(--text2);
  box-shadow:0 1px 6px rgba(0,0,0,.1);z-index:31;cursor:pointer;
}

/* ── 툴바 ── */
#toolbar{
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  flex-shrink:0;
}
.tb-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tb-sep{width:1px;height:28px;background:var(--border);margin:0 2px}
.tb-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.tb-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);font-size:11px;font-weight:600;color:var(--text2);
  cursor:pointer;font-family:var(--font);white-space:nowrap;min-width:52px;
  transition:background .12s,border-color .12s;
}
.tb-btn:hover{background:var(--bg);border-color:var(--border2)}
.tb-btn.active{background:var(--blue-lt);border-color:#93C5FD;color:var(--blue)}
.tb-btn.danger{color:var(--red);border-color:#FECACA;background:#FEF2F2}
.tb-btn.danger:hover{background:#FEE2E2}
.tb-btn svg{display:block}

/* ── 오버레이 편집 패널 (가계도 클릭시) ── */
#edit-panel{
  position:absolute;right:10px;bottom:10px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);width:220px;padding:14px;
  display:none;z-index:20;
}
#edit-panel.show{display:block}
.ep-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ep-close{background:var(--bg);border:none;border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;color:var(--text3)}
.ef{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.ef label{font-size:11px;font-weight:600;color:var(--text2)}
.ef input,.ef select{
  padding:7px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);
}
.ef input:focus,.ef select:focus{outline:none;border-color:var(--blue)}
.ef-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ep-del{
  width:100%;margin-top:8px;padding:8px;border-radius:7px;border:none;
  background:#FEF2F2;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font);
}
.ep-del:hover{background:#FEE2E2}

/* ── 정보/메모 패널 ── */
#info-panel,#memo-panel{overflow-y:auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgrid .full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:600;color:var(--text2)}
.fg input,.fg select,.fg textarea{
  padding:9px 11px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface);
}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:72px}
.save-btn{
  display:block;padding:10px;border-radius:8px;border:none;
  background:var(--blue);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--font);width:100%;margin-top:4px;
}
/* 메모 */
.memo-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.memo-box textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);resize:none;height:72px;margin-bottom:8px}
.memo-box textarea:focus{outline:none;border-color:var(--blue)}
.memo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.memo-text{font-size:14px;line-height:1.65;margin-bottom:6px}
.memo-meta{display:flex;justify-content:space-between;align-items:center}
.memo-date{font-size:11px;color:var(--text3)}
.memo-del{background:none;border:none;color:var(--text3);font-size:12px;padding:2px 6px;cursor:pointer}

/* ── 빈 상태 (메인) ── */
#empty-main{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);gap:10px;padding:40px;text-align:center;
}
#empty-main .ei{font-size:56px;opacity:.4}

/* ── 모달 ── */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-ov.show{display:flex}
.modal{
  background:var(--surface);border-radius:14px;
  padding:24px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.mf label{font-size:12px;font-weight:600;color:var(--text2)}
.mf input{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:var(--font);width:100%}
.mf input:focus{outline:none;border-color:var(--blue)}
.modal-footer{display:flex;gap:8px;margin-top:18px}
.modal-footer button{
  flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);font-family:var(--font);
}
.modal-footer .btn-ok{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-footer .btn-ok:hover{background:var(--blue-dk)}

/* ── 모바일 반응형 ── */
@media(max-width:640px){
  #sidebar{
    position:fixed;inset:0;width:100%;z-index:100;
    transform:translateX(0);transition:transform .26s ease;
  }
  #sidebar.hidden{transform:translateX(-100%)}
  #main{width:100%}
  #mobile-back{display:block}
  #toolbar{overflow-x:auto;flex-wrap:nowrap;padding:8px 12px}
  #edit-panel{right:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);width:200px}
  .fgrid{grid-template-columns:1fr}
  .fgrid .full{grid-column:1}
  #info-panel,#memo-panel{padding:14px}
  .tab{padding:10px 14px;font-size:12px}
  .hdr-btn{padding:5px 10px;font-size:12px}
}
</style>
</head>
<body>

<!-- 사이드바: 사례 목록 -->
<div id="sidebar">
  <div id="sidebar-hdr">
    <h1>🏥 가계도 관리</h1>
    <p>공주시정신건강복지센터</p>
  </div>
  <div id="case-list">
    <div class="empty-tip">
      <div class="ei">📋</div>
      <p style="font-weight:600;margin-bottom:4px">사례가 없습니다</p>
      <p>아래 버튼으로 추가하세요</p>
    </div>
  </div>
  <div id="sidebar-add">
    <button class="btn-add" onclick="openModal()">＋ 새 사례 추가</button>
  </div>
</div>

<!-- 메인 -->
<div id="main">
  <!-- 빈 상태 -->
  <div id="empty-main">
    <div class="ei">🧬</div>
    <p style="font-size:15px;font-weight:600;color:var(--text2)">사례를 선택하세요</p>
    <p style="font-size:13px">왼쪽 목록에서 사례를 선택하거나 추가하세요</p>
  </div>

  <!-- 사례 뷰 (선택 시) -->
  <div id="case-view" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
    <div id="main-hdr">
      <button id="mobile-back" onclick="mobileBack()">←</button>
      <div style="flex:1;min-width:0">
        <div id="hdr-title">-</div>
        <div id="hdr-sub">-</div>
      </div>
      <button class="hdr-btn" onclick="exportJPG()" title="JPG로 저장">🖼 JPG</button>
      <button class="hdr-btn" onclick="exportSVG()" title="SVG로 저장">⬇ SVG</button>
      <button class="hdr-btn danger" onclick="deleteCase()" style="color:var(--red);margin-left:4px" title="사례 삭제">삭제</button>
    </div>
    <div id="tabs">
      <button class="tab active" onclick="switchTab('geno')">🧬 가계도</button>
      <button class="tab" onclick="switchTab('info')">📄 사례정보</button>
      <button class="tab" onclick="switchTab('memo')">📝 메모</button>
    </div>

    <!-- 가계도 패널 -->
    <div id="geno-panel" class="panel active">
      <div id="canvas-wrap">
        <svg id="geno-canvas" xmlns="http://www.w3.org/2000/svg">
          <g id="groups-layer"></g>
          <g id="couple-layer"></g>
          <g id="edges-layer"></g>
          <g id="nodes-layer"></g>
        </svg>
        <div id="rel-toast">
          <div id="rel-toast-text">구성원을 클릭하세요</div>
          <button id="rel-toast-btn" onclick="commitFamily()">✓ 연결 완료</button>
        </div>
        <button id="cancel-rel" onclick="cancelRel()">✕ 취소</button>
      </div>

      <!-- 노드 편집 오버레이 -->
      <div id="edit-panel">
        <div class="ep-title">
          구성원 편집
          <button class="ep-close" onclick="closeEdit()">✕</button>
        </div>
        <div class="ef-row">
          <div class="ef"><label>이름</label><input id="ep-name" type="text" placeholder="이름" oninput="updateNode()"></div>
          <div class="ef"><label>나이</label><input id="ep-age" type="text" placeholder="나이" oninput="updateNode()"></div>
        </div>
        <div class="ef" style="margin-top:8px"><label>메모 (직업·진단명 등)</label><input id="ep-note" type="text" oninput="updateNode()"></div>
        <div class="ef" style="margin-top:8px"><label>문제/상태 표시</label>
          <select id="ep-mark" onchange="updateNode()">
            <option value="">없음</option>
            <optgroup label="── 사망">
              <option value="deceased">사망 (X표시)</option>
            </optgroup>
            <optgroup label="── 클라이언트">
              <option value="ip">주요 클라이언트 IP (밑줄)</option>
            </optgroup>
            <optgroup label="── 문제">
              <option value="prob-drug">약물남용/정신·신체 문제 (좌상 반쪽)</option>
              <option value="prob-severe">심한 정신·신체 문제 (가득 채움)</option>
              <option value="prob-drug-male">약물남용 남성 (우하 반쪽)</option>
              <option value="prob-suspect">약물남용 의심 (우상 반쪽)</option>
              <option value="prob-recovery">약물남용 회복 (좌하 반쪽)</option>
            </optgroup>
            <optgroup label="── 자녀 유형">
              <option value="child-foster">위탁 자녀</option>
              <option value="child-adopted">입양 자녀</option>
            </optgroup>
          </select>
        </div>
        <label style="display:flex;align-items:center;gap:7px;margin-top:10px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer">
          <input type="checkbox" id="ep-ct" onchange="updateNode()" style="width:16px;height:16px;accent-color:var(--blue)"> CT 본인 (이중선)
        </label>
        <button class="ep-del" onclick="deleteNode()">이 구성원 삭제</button>
      </div>

      <!-- 툴바 -->
      <div id="toolbar">
        <span class="tb-label">추가</span>
        <div class="tb-group">
          <button class="tb-btn" onclick="addNode('male')" title="남성 추가">
            <svg width="18" height="18" viewBox="0 0 18 18"><rect x="1" y="1" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            남성
          </button>
          <button class="tb-btn" onclick="addNode('female')" title="여성 추가">
            <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            여성
          </button>
          <button class="tb-btn" onclick="addNode('unknown')" title="성별미상">
            <svg width="18" height="18" viewBox="0 0 18 18"><polygon points="9,1 17,17 1,17" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            미상
          </button>
        </div>
        <div class="tb-sep"></div>
        <span class="tb-label">직계</span>
        <div class="tb-group" style="flex-wrap:wrap;gap:5px">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <button class="tb-btn" id="rb-family" onclick="startRel('family')" title="부모-자녀 연결">
              <svg width="18" height="18" viewBox="0 0 18 18"><rect x="1" y="1" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="14" cy="4" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="4" y1="7" x2="4" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="14" y1="7" x2="14" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="11" x2="17" y2="11" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2,1.5"/><circle cx="4" cy="14.5" r="2.5" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="14.5" r="2.5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
              가족연결
            </button>
            <select id="family-couple-type" style="padding:5px 7px;border:1px solid var(--border);border-radius:7px;font-size:11px;font-family:var(--font);color:var(--text2);background:var(--surface);height:36px" title="부부 관계선">
              <option value="marriage">결혼</option>
              <option value="separated">벌거</option>
              <option value="divorce">이혼</option>
              <option value="remarry">재결합</option>
              <option value="cohabit">동거</option>
              <option value="none">선없음</option>
            </select>
          </div>
        </div>
        <div class="tb-sep"></div>
        <span class="tb-label">그룹</span>
        <div class="tb-group">
          <button class="tb-btn" id="rb-cohabgroup" onclick="startCohabGroup()" title="동거 그룹 (점선 타원)">
            <svg width="28" height="18" viewBox="0 0 28 18"><ellipse cx="14" cy="9" rx="13" ry="8" fill="none" stroke="#64748B" stroke-width="1.8" stroke-dasharray="4,3"/><rect x="5" y="5" width="6" height="6" rx="1" fill="none" stroke="#64748B" stroke-width="1.5"/><circle cx="20" cy="9" r="3.5" fill="none" stroke="#64748B" stroke-width="1.5"/></svg>
            동거그룹
          </button>
        </div>
        <div class="tb-sep"></div>
        <span class="tb-label">관계선</span>
        <div class="tb-group">
          <button class="tb-btn" id="rb-close" onclick="startRel('close')" title="친밀한 관계">
            <svg width="26" height="10" viewBox="0 0 26 10"><line x1="0" y1="5" x2="26" y2="5" stroke="#059669" stroke-width="2"/><line x1="0" y1="9" x2="26" y2="9" stroke="#059669" stroke-width="2"/></svg>
            친밀
          </button>
          <button class="tb-btn" id="rb-distant" onclick="startRel('distant')" title="소원한 관계">

            친밀적대
          </button>
        </div>
        <div class="tb-sep"></div>
        <span class="tb-label">결혼·이혼</span>
        <div class="tb-group">
          <button class="tb-btn" id="rb-marriage" onclick="startRel('marriage')" title="결혼">
            <svg width="26" height="6" viewBox="0 0 26 6"><line x1="0" y1="3" x2="26" y2="3" stroke="currentColor" stroke-width="2.5"/></svg>
            결혼
          </button>
          <button class="tb-btn" id="rb-separated" onclick="startRel('separated')" title="벌거">
            <svg width="26" height="10" viewBox="0 0 26 10"><line x1="0" y1="5" x2="26" y2="5" stroke="#94A3B8" stroke-width="2.5"/><line x1="11" y1="0" x2="14" y2="10" stroke="#94A3B8" stroke-width="2"/></svg>
            벌거
          </button>
          <button class="tb-btn" id="rb-divorce" onclick="startRel('divorce')" title="이혼">
            <svg width="26" height="10" viewBox="0 0 26 10"><line x1="0" y1="5" x2="26" y2="5" stroke="#94A3B8" stroke-width="2.5"/><line x1="9" y1="0" x2="12" y2="10" stroke="#94A3B8" stroke-width="2"/><line x1="14" y1="0" x2="17" y2="10" stroke="#94A3B8" stroke-width="2"/></svg>
            이혼
          </button>
          <button class="tb-btn" id="rb-remarry" onclick="startRel('remarry')" title="이혼 후 재결합">
            <svg width="26" height="10" viewBox="0 0 26 10"><line x1="0" y1="5" x2="26" y2="5" stroke="#334155" stroke-width="2.5"/><line x1="7" y1="0" x2="10" y2="10" stroke="#94A3B8" stroke-width="1.8"/><line x1="11" y1="0" x2="14" y2="10" stroke="#94A3B8" stroke-width="1.8"/><line x1="19" y1="0" x2="22" y2="10" stroke="#334155" stroke-width="2"/></svg>
            재결합
          </button>
        </div>
        <div class="tb-sep"></div>
        <div class="tb-group">
          <button class="tb-btn" onclick="undoAction()" title="실행취소">
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 9a6 6 0 1 1 1.5 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="3,4 3,9 8,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            취소
          </button>
          <button class="tb-btn danger" onclick="clearGenogram()" title="초기화">
            <svg width="18" height="18" viewBox="0 0 18 18"><polyline points="2,4 3,4 16,4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5,4V3a1,1 0 0,1 1-1h6a1,1 0 0,1 1,1v1M13,4v11a1,1 0 0,1-1,1H6a1,1 0 0,1-1-1V4" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>

      <div class="card">

          <div class="fg"><label>CT 성명</label><input id="fi-name" type="text" oninput="saveInfo()"></div>
          <div class="fg"><label>생년월일</label><input id="fi-birth" type="text" placeholder="YYYY-MM-DD" oninput="saveInfo()"></div>
          <div class="fg"><label>성별</label>
            <select id="fi-sex" onchange="saveInfo()"><option value="">선택</option><option>남</option><option>여</option></select>
          </div>
          <div class="fg"><label>연락처</label><input id="fi-tel" type="tel" oninput="saveInfo()"></div>
          <div class="fg full"><label>주소</label><input id="fi-addr" type="text" oninput="saveInfo()"></div>
          <div class="fg"><label>담당 사회복지사</label><input id="fi-sw" type="text" oninput="saveInfo()"></div>
          <div class="fg"><label>사례 등록일</label><input id="fi-date" type="date" oninput="saveInfo()"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🏥 진단 및 서비스</div>
        <div class="fgrid">
          <div class="fg"><label>주요 진단명</label><input id="fi-diag" type="text" oninput="saveInfo()"></div>

            <select id="fi-svc" onchange="saveInfo()">
              <option value="">선택</option><option>집중사례관리</option><option>일반사례관리</option>
              <option>위기개입</option><option>정보제공</option><option>종결</option>
            </select>
          </div>
          <div class="fg full"><label>의뢰 사유</label><textarea id="fi-reason" oninput="saveInfo()"></textarea></div>
          <div class="fg full"><label>현재 상황 요약</label><textarea id="fi-summary" oninput="saveInfo()"></textarea></div>

    <!-- 메모 패널 -->

<!-- 새 사례 모달 -->
<div class="modal-ov" id="modal-new">
  <div class="modal">
    <h3>새 사례 추가</h3>
    <div class="mf"><label>CT 성명 *</label><input id="nc-name" type="text" placeholder="홍길동"></div>
    <div class="mf"><label>담당 사회복지사</label><input id="nc-sw" type="text" placeholder="담당자 이름"></div>
    <div class="mf"><label>사례 등록일</label><input id="nc-date" type="date"></div>
    <div class="modal-footer">
      <button onclick="closeModal()">취소</button>
      <button class="btn-ok" onclick="createCase()">추가</button>
    </div>
  </div>
</div>

<script>
/* ───────── 데이터 ───────── */
let cases = {}, currentId = null;

function save() {
  try { localStorage.setItem('geno_v4', JSON.stringify(cases)); } catch(e){}
}
function load() {
  try { const d = localStorage.getItem('geno_v4'); if(d) cases = JSON.parse(d); } catch(e){}
}

/* ───────── 사례 목록 ───────── */
function renderList() {
  const el = document.getElementById('case-list');
  const ids = Object.keys(cases);
  if(!ids.length) {
    el.innerHTML = `<div class="empty-tip"><div class="ei">📋</div><p style="font-weight:600;margin-bottom:4px">사례가 없습니다</p><p>아래 버튼으로 추가하세요</p></div>`;
    return;
  }
  el.innerHTML = ids.map(id => {
    const c = cases[id];
    const isActive = id === currentId ? ' active' : '';
    return `<div class="case-card${isActive}" onclick="selectCase('${id}')">
      <div class="case-av">${(c.name||'?').slice(0,2)}</div>
      <div style="flex:1;min-width:0">
        <div class="case-name">${c.name||'이름없음'}</div>
        <div class="case-sub">${c.sw||'담당자 미지정'}</div>
      </div>
    </div>`;
  }).join('');
}

function selectCase(id) {
  currentId = id;
  renderList();
  loadCaseView();
  // 모바일: 사이드바 숨기기
  if(window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('hidden');
  }
}

function mobileBack() {
  document.getElementById('sidebar').classList.remove('hidden');
}

function openModal() {
  document.getElementById('nc-name').value = '';
  document.getElementById('nc-sw').value = '';
  document.getElementById('nc-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('modal-new').classList.add('show');
  setTimeout(() => document.getElementById('nc-name').focus(), 100);
}
function closeModal() { document.getElementById('modal-new').classList.remove('show'); }
document.getElementById('modal-new').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-new')) closeModal();
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') { closeModal(); cancelRel(); cancelCohabGroup(); }
  if(e.key === 'Enter' && relMode === 'family') commitFamily();
});

function createCase() {
  const name = document.getElementById('nc-name').value.trim();
  if(!name) { alert('CT 성명을 입력하세요.'); return; }
  const id = 'c_' + Date.now();
  cases[id] = {
    id, name,
    sw: document.getElementById('nc-sw').value.trim(),
    date: document.getElementById('nc-date').value,
    info: {}, memos: [],
    genogram: { nodes: [], edges: [] }
  };
  save(); closeModal(); selectCase(id);
}

function deleteCase() {
  if(!currentId) return;
  const c = cases[currentId];
  if(!confirm(`'${c.name}' 사례를 삭제하시겠습니까?`)) return;
  delete cases[currentId];
  currentId = null;
  save(); renderList();
  document.getElementById('empty-main').style.display = '';
  document.getElementById('case-view').style.display = 'none';
}

/* ───────── 케이스 뷰 로드 ───────── */
function loadCaseView() {
  const c = cases[currentId]; if(!c) return;
  document.getElementById('hdr-title').textContent = c.name || '이름없음';
  document.getElementById('hdr-sub').textContent = (c.sw || '담당자 미지정') + (c.date ? ' · ' + c.date : '');

  const info = c.info || {};
  ['name','birth','sex','tel','addr','sw','date','diag','svc','reason','summary'].forEach(k => {
    const el = document.getElementById('fi-'+k); if(el) el.value = info[k] || '';
  });

  const g = c.genogram || { nodes:[], edges:[], groups:[] };
  nodes = JSON.parse(JSON.stringify(g.nodes || []));
  edges = JSON.parse(JSON.stringify(g.edges || []));
  groups = JSON.parse(JSON.stringify(g.groups || []));
  nodeId = nodes.reduce((m,n) => Math.max(m, n.id+1), 0);
  edgeId = edges.reduce((m,e) => Math.max(m, e.id+1), 0);
  groupId = groups.reduce((m,g2) => Math.max(m, g2.id+1), 0);
  history = []; cancelRel(); cancelCohabGroup(); closeEdit();
  vpX = 0; vpY = 0; vpScale = 1;
  render(); renderMemos();

  document.getElementById('empty-main').style.display = 'none';
  const cv = document.getElementById('case-view');
  cv.style.display = 'flex'; cv.style.flexDirection = 'column';
  switchTab('geno');
}

/* ───────── 탭 전환 ───────── */
let curTab = 'geno';
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['geno','info','memo'][i] === tab);
  });
  ['geno','info','memo'].forEach(t => {
    const p = document.getElementById(t === 'geno' ? 'geno-panel' : t + '-panel');
    p.classList.toggle('active', t === tab);
  });
}

/* ───────── 정보 저장 ───────── */
let infoTimer = null;
function saveInfo() {
  if(!currentId) return;
  const c = cases[currentId]; if(!c) return;
  if(!c.info) c.info = {};
  ['name','birth','sex','tel','addr','sw','date','diag','svc','reason','summary'].forEach(k => {
    const el = document.getElementById('fi-'+k); if(el) c.info[k] = el.value;
  });
  clearTimeout(infoTimer); infoTimer = setTimeout(() => save(), 1000);
}

/* ───────── 메모 ───────── */
function addMemo() {
  const txt = document.getElementById('memo-input').value.trim();
  if(!txt || !currentId) return;
  const c = cases[currentId]; if(!c.memos) c.memos = [];
  c.memos.unshift({ id: Date.now(), text: txt, date: new Date().toLocaleString('ko-KR') });
  document.getElementById('memo-input').value = '';
  save(); renderMemos();
}
function deleteMemo(mid) {
  const c = cases[currentId]; if(!c) return;
  c.memos = (c.memos||[]).filter(m => m.id !== mid);
  save(); renderMemos();
}
function renderMemos() {
  const c = cases[currentId]; if(!c) return;
  const list = c.memos || [];
  document.getElementById('memo-list').innerHTML = list.length
    ? list.map(m => `<div class="memo-item">
        <div class="memo-text">${m.text.replace(/\n/g,'<br>')}</div>
        <div class="memo-meta">
          <span class="memo-date">${m.date}</span>
          <button class="memo-del" onclick="deleteMemo(${m.id})">🗑 삭제</button>
        </div></div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:20px">메모가 없습니다.</p>';
}

/* ───────── 가계도 엔진 ───────── */
const canvas = document.getElementById('geno-canvas');
const nodesLayer = document.getElementById('nodes-layer');
const edgesLayer = document.getElementById('edges-layer');
const groupsLayer = document.getElementById('groups-layer');
const coupleLayer = document.getElementById('couple-layer');

let nodes = [], edges = [], groups = [], selected = null;
let dragging = null, dragOffset = {x:0,y:0}, didDrag = false;
let relMode = null, relFirst = null, relParents = null, relChildren = [];
let groupMode = false, groupMembers = [];
let history = [], nodeId = 0, edgeId = 0, groupId = 0;
const R = 24;
let vpX = 0, vpY = 0, vpScale = 1;

const REL_LABELS = {
  family:'직계가족',
  marriage:'결혼', separated:'벌거', divorce:'이혼', remarry:'재결합',
  close:'친밀', distant:'소원', enmesh:'밀착', cut:'단절',
  conflict:'갈등', 'fused-conflict':'융합갈등', hostile:'친밀적대'
};

function saveHist() { history.push({ n: JSON.stringify(nodes), e: JSON.stringify(edges), g: JSON.stringify(groups) }); }
function undoAction() {
  if(!history.length) return;
  const s = history.pop();
  nodes = JSON.parse(s.n); edges = JSON.parse(s.e); groups = JSON.parse(s.g||'[]');
  nodeId = nodes.reduce((m,n) => Math.max(m,n.id+1), 0);
  edgeId = edges.reduce((m,e) => Math.max(m,e.id+1), 0);
  groupId = groups.reduce((m,g) => Math.max(m,g.id+1), 0);
  render(); saveGeno();
}
function clearGenogram() {
  if(!confirm('가계도를 초기화하시겠습니까?')) return;
  saveHist(); nodes = []; edges = []; groups = []; nodeId = 0; edgeId = 0; groupId = 0;
  closeEdit(); cancelCohabGroup(); render(); saveGeno();
}

function addNode(sex) {
  if(!currentId) return;
  saveHist();
  const wrap = document.getElementById('canvas-wrap');
  const cx = (wrap.clientWidth/2 - vpX) / vpScale;
  const cy = (wrap.clientHeight/2 - vpY) / vpScale;
  nodes.push({ id: nodeId++, sex, x: cx+(Math.random()-.5)*120, y: cy+(Math.random()-.5)*80, name:'', age:'', note:'', mark:'', ct:false });
  render(); saveGeno();
}

/* ── 좌표 변환 ── */
function toCanvas(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left - vpX) / vpScale, y: (cy - r.top - vpY) / vpScale };
}
function applyVP() {
  const tf = `translate(${vpX},${vpY}) scale(${vpScale})`;
  nodesLayer.setAttribute('transform', tf);
  edgesLayer.setAttribute('transform', tf);
  groupsLayer.setAttribute('transform', tf);
  coupleLayer.setAttribute('transform', tf);
}

/* ── 포인터 이벤트 (드래그) ── */
let activePtrId = null, ptrMoved = false;

function onPointerDownNode(e, id) {
  e.preventDefault(); e.stopPropagation();
  activePtrId = e.pointerId;
  ptrMoved = false;
  const pt = toCanvas(e.clientX, e.clientY);
  dragging = id; didDrag = false;
  const n = nodes.find(n => n.id === id);
  dragOffset = { x: pt.x - n.x, y: pt.y - n.y };
}
canvas.addEventListener('pointermove', e => {
  if(dragging === null) return;
  if(activePtrId !== null && e.pointerId !== activePtrId) return;
  ptrMoved = true;
  const pt = toCanvas(e.clientX, e.clientY);
  const n = nodes.find(n => n.id === dragging);
  if(n) { n.x = pt.x - dragOffset.x; n.y = pt.y - dragOffset.y; didDrag = true; render(); }
}, {passive:true});
canvas.addEventListener('pointerup', e => {
  if(dragging !== null) {
    if(didDrag) { saveHist(); saveGeno(); }
    else onNodeTap(e, dragging);
    dragging = null; didDrag = false; activePtrId = null;
  } else if(!ptrMoved) {
    selected = null; closeEdit(); render();
  }
  ptrMoved = false;
}, {passive:true});

function onNodeTap(e, id) {
  // 동거 그룹 모드
  if(groupMode) {
    if(groupMembers.includes(id)) {
      groupMembers = groupMembers.filter(x => x !== id);
    } else {
      groupMembers.push(id);
    }
    const ok = groupMembers.length >= 1;
    document.getElementById('rel-toast-btn').style.display = ok ? 'block' : 'none';
    document.getElementById('rel-toast-text').textContent =
      groupMembers.length === 0 ? '동거 그룹에 포함할 구성원을 클릭하세요'
      : `${groupMembers.length}명 선택됨 — 더 클릭하거나 완료`;
    render(); return;
  }
  if(relMode === 'family') {
    if(relParents && relParents.includes(id)) { relParents = relParents.filter(x=>x!==id); updateToast(); render(); return; }
    if(relChildren.includes(id)) { relChildren = relChildren.filter(x=>x!==id); updateToast(); render(); return; }
    if(!relParents) { relParents = [id]; updateToast(); render(); return; }
    if(relParents.length < 2 && relChildren.length === 0) { relParents = [...relParents, id]; updateToast(); render(); return; }
    relChildren = [...relChildren, id]; updateToast(); render(); return;
  }
  if(relMode) {
    if(relFirst === null) { relFirst = id; updateToast(); render(); return; }
    if(relFirst === id) { cancelRel(); return; }
    saveHist();
    const dup = edges.find(ex => ex.type === relMode && ((ex.a===relFirst&&ex.b===id)||(ex.a===id&&ex.b===relFirst)));
    if(!dup) edges.push({ id: edgeId++, a: relFirst, b: id, type: relMode });
    cancelRel(); render(); saveGeno(); return;
  }
  selected = id; openEdit(id); render();
}

/* ── 핀치줌 + 터치팬 ── */
let tc=[], pinchD0=0, pinchScale0=1, pinchMid0={x:0,y:0}, pinchVp0={x:0,y:0};
let panT0=null, panVp0={x:0,y:0};

canvas.addEventListener('touchstart', e => {
  tc = [...e.touches];
  if(tc.length===2) {
    dragging = null;
    pinchD0 = Math.hypot(tc[1].clientX-tc[0].clientX, tc[1].clientY-tc[0].clientY);
    pinchScale0 = vpScale;
    const r = canvas.getBoundingClientRect();
    pinchMid0 = { x:(tc[0].clientX+tc[1].clientX)/2-r.left, y:(tc[0].clientY+tc[1].clientY)/2-r.top };
    pinchVp0 = { x:vpX, y:vpY };
  } else if(tc.length===1 && dragging===null) {
    panT0 = { x:tc[0].clientX, y:tc[0].clientY }; panVp0 = { x:vpX, y:vpY };
  }
}, {passive:true});

canvas.addEventListener('touchmove', e => {
  if(e.touches.length===2) {
    e.preventDefault();
    const d = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
    const ns = Math.max(.3, Math.min(3, pinchScale0*(d/pinchD0)));
    const r = canvas.getBoundingClientRect();
    const mid = { x:(e.touches[0].clientX+e.touches[1].clientX)/2-r.left, y:(e.touches[0].clientY+e.touches[1].clientY)/2-r.top };
    const ratio = ns/pinchScale0;
    vpX = pinchMid0.x - ratio*(pinchMid0.x-pinchVp0.x) + (mid.x-pinchMid0.x);
    vpY = pinchMid0.y - ratio*(pinchMid0.y-pinchVp0.y) + (mid.y-pinchMid0.y);
    vpScale = ns; applyVP();
  } else if(e.touches.length===1 && dragging===null && panT0) {
    ptrMoved = true;
    vpX = panVp0.x + (e.touches[0].clientX - panT0.x);
    vpY = panVp0.y + (e.touches[0].clientY - panT0.y);
    applyVP();
  }
}, {passive:false});
canvas.addEventListener('touchend', () => { panT0 = null; }, {passive:true});

/* ── 마우스 팬 + 휠줌 ── */
let mPan=false, mPanStart=null, mPanVp=null;
canvas.addEventListener('mousedown', e => {
  if(dragging!==null || e.button!==0) return;
  mPan=true; mPanStart={x:e.clientX,y:e.clientY}; mPanVp={x:vpX,y:vpY};
});
canvas.addEventListener('mousemove', e => {
  if(mPan && dragging===null) {
    ptrMoved=true; vpX=mPanVp.x+(e.clientX-mPanStart.x); vpY=mPanVp.y+(e.clientY-mPanStart.y); applyVP();
  }
});
canvas.addEventListener('mouseup', () => { mPan=false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? .9 : 1.1;
  const r = canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns = Math.max(.3, Math.min(3, vpScale*d));
  const ratio = ns/vpScale;
  vpX=mx-ratio*(mx-vpX); vpY=my-ratio*(my-vpY); vpScale=ns; applyVP();
}, {passive:false});

/* ── 편집 패널 ── */
function openEdit(id) {
  const n = nodes.find(n => n.id===id); if(!n) return;
  document.getElementById('ep-name').value = n.name || '';
  document.getElementById('ep-age').value = n.age || '';
  document.getElementById('ep-note').value = n.note || '';
  document.getElementById('ep-mark').value = n.mark || '';
  document.getElementById('ep-ct').checked = !!n.ct;
  document.getElementById('edit-panel').classList.add('show');
}
function closeEdit() {
  document.getElementById('edit-panel').classList.remove('show');
  selected = null;
}
function updateNode() {
  const n = nodes.find(n => n.id===selected); if(!n) return;
  n.name = document.getElementById('ep-name').value;
  n.age = document.getElementById('ep-age').value;
  n.note = document.getElementById('ep-note').value;
  n.mark = document.getElementById('ep-mark').value;
  n.ct = document.getElementById('ep-ct').checked;
  render(); saveGeno();
}
function deleteNode() {
  if(selected===null) return;
  if(!confirm('이 구성원을 삭제하시겠습니까?')) return;
  saveHist();
  nodes = nodes.filter(n => n.id!==selected);
  edges = edges.filter(e => e.a!==selected && e.b!==selected
    && !(e.type==='family' && (e.parents||[]).includes(selected))
    && !(e.type==='family' && (e.children||[]).includes(selected)));
  closeEdit(); render(); saveGeno();
}
// 편집 패널 바깥 클릭 시 닫기
document.getElementById('canvas-wrap').addEventListener('pointerdown', e => {
  const ep = document.getElementById('edit-panel');
  if(ep.classList.contains('show') && !ep.contains(e.target)) closeEdit();
});

/* ── 관계선 모드 ── */
function startRel(type) {
  relMode=type; relFirst=null; relParents=null; relChildren=[];
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('rb-'+type);
  if(btn) btn.classList.add('active');
  updateToast();
  document.getElementById('rel-toast').classList.add('show');
  document.getElementById('cancel-rel').style.display = 'block';
  closeEdit();
}
function cancelRel() {
  relMode=null; relFirst=null; relParents=null; relChildren=[];
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('rel-toast').classList.remove('show');
  document.getElementById('cancel-rel').style.display = 'none';
  render();
}
function updateToast() {
  const btn = document.getElementById('rel-toast-btn');
  if(relMode==='family') {
    const ok = relParents && relParents.length>=1 && relChildren.length>=1;
    btn.style.display = ok ? 'block' : 'none';
    let msg;
    if(!relParents) msg = '[직계가족] 부모를 클릭하세요 (최대 2명)';
    else if(relParents.length===1 && relChildren.length===0) msg = '두 번째 부모 또는 자녀를 클릭하세요';
    else if(relChildren.length===0) msg = '자녀를 클릭하세요 (여러 명 가능)';
    else msg = `자녀 ${relChildren.length}명 — 더 추가하거나 완료 버튼 클릭`;
    document.getElementById('rel-toast-text').textContent = msg;
  } else {
    btn.style.display = 'none';
    document.getElementById('rel-toast-text').textContent =
      relFirst===null ? `[${REL_LABELS[relMode]}] 첫 번째 구성원을 클릭하세요` : `[${REL_LABELS[relMode]}] 두 번째 구성원을 클릭하세요`;
  }
}
function commitFamily() {
  if(!relParents || relParents.length<1 || relChildren.length<1) return;
  saveHist();
  const ct = document.getElementById('family-couple-type')?.value || 'marriage';
  edges.push({ id: edgeId++, type:'family', coupleType:ct, parents:[...relParents], children:[...relChildren] });
  cancelRel(); render(); saveGeno();
}

/* ── 저장 ── */
let genoTimer = null;
function saveGeno() {
  if(!currentId) return;
  const c = cases[currentId]; if(!c) return;
  c.genogram = { nodes: JSON.parse(JSON.stringify(nodes)), edges: JSON.parse(JSON.stringify(edges)), groups: JSON.parse(JSON.stringify(groups)) };
  clearTimeout(genoTimer); genoTimer = setTimeout(() => save(), 600);
}

/* ── 렌더링 ── */
function render() { renderGroups(); renderEdges(); renderNodes(); applyVP(); }

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  return el;
}
function svgTxt(x,y,text,fill,size,anchor) {
  const t = svgEl('text', {x,y,fill,'font-size':size,'text-anchor':anchor,'font-family':'sans-serif'});
  t.textContent = text; return t;
}
function makeShape(sex, x, y, r, fill, stroke, sw) {
  if(sex==='male') return svgEl('rect', {x:x-r,y:y-r,width:r*2,height:r*2,rx:'3',fill,stroke,'stroke-width':sw});
  if(sex==='female') return svgEl('circle', {cx:x,cy:y,r,fill,stroke,'stroke-width':sw});
  return svgEl('polygon', {points:`${x},${y-r} ${x+r},${y+r*.7} ${x-r},${y+r*.7}`,fill,stroke,'stroke-width':sw});
}

function renderNodes() {
  nodesLayer.innerHTML = '';
  nodes.forEach(n => {
    const g = svgEl('g', {'data-id': n.id});
    const isSel  = selected === n.id;
    const isPar  = relMode==='family' && relParents && relParents.includes(n.id);
    const isChild= relMode==='family' && relChildren.includes(n.id);
    const isFirst= relMode && relMode!=='family' && relFirst===n.id;

    // CT 이중 윤곽
    if(n.ct) g.appendChild(makeShape(n.sex, n.x, n.y, R+7, 'none', '#2563EB', '2'));
    // 관계 모드 하이라이트
    if(isPar)  { const h=makeShape(n.sex,n.x,n.y,R+6,'none','#2563EB','2.5'); h.setAttribute('stroke-dasharray','5,3'); g.appendChild(h); }
    if(isChild){ const h=makeShape(n.sex,n.x,n.y,R+6,'none','#059669','2.5'); h.setAttribute('stroke-dasharray','5,3'); g.appendChild(h); }
    if(isFirst){ const h=makeShape(n.sex,n.x,n.y,R+6,'none','#2563EB','2.5'); h.setAttribute('stroke-dasharray','5,3'); g.appendChild(h); }

    // ── 문제 반쪽 채움 (배경 먼저) ──
    const fillColor = '#334155';
    const mark = n.mark || '';
    if(mark.startsWith('prob-') || mark==='deceased') {
      // 흰 배경 도형 먼저
      g.appendChild(makeShape(n.sex, n.x, n.y, R, '#fff', isSel?'#2563EB':'#334155', isSel?'2.5':'1.8'));
    }

    if(mark === 'prob-drug') {
      // 좌상 1/4 채움 (약물/정신·신체 문제)
      drawQuarterFill(g, n, 'top-left', fillColor);
    } else if(mark === 'prob-severe') {
      // 가득 채움 (심한 문제)
      g.appendChild(makeShape(n.sex, n.x, n.y, R, fillColor, isSel?'#2563EB':'#334155', isSel?'2.5':'1.8'));
    } else if(mark === 'prob-drug-male') {
      // 우하 1/4 채움 (약물남용 남성)
      drawQuarterFill(g, n, 'bottom-right', fillColor);
    } else if(mark === 'prob-suspect') {
      // 우상 1/4 채움 (의심)
      drawQuarterFill(g, n, 'top-right', '#94A3B8');
    } else if(mark === 'prob-recovery') {
      // 좌하 1/4 채움 (회복)
      drawQuarterFill(g, n, 'bottom-left', '#6EE7B7');
    } else {
      // 일반 흰 배경
      g.appendChild(makeShape(n.sex, n.x, n.y, R, '#fff', isSel?'#2563EB':'#334155', isSel?'2.5':'1.8'));
    }

    // ── 사망 X 표시 ──
    if(mark === 'deceased') {
      [[-1,-1,1,1],[1,-1,-1,1]].forEach(([dx1,dy1,dx2,dy2]) => {
        g.appendChild(svgEl('line', {x1:n.x+dx1*R*.75,y1:n.y+dy1*R*.75,x2:n.x+dx2*R*.75,y2:n.y+dy2*R*.75,stroke:'#334155','stroke-width':'2.5','stroke-linecap':'round'}));
      });
    }

    // ── 주요 클라이언트 밑줄 ──
    if(mark === 'ip') {
      g.appendChild(svgEl('line', {x1:n.x-R,y1:n.y+R+6,x2:n.x+R,y2:n.y+R+6,stroke:'#2563EB','stroke-width':'3.5','stroke-linecap':'round'}));
    }

    // ── CT 라벨 ──
    if(n.ct) {
      const t = svgTxt(n.x+R+8, n.y-R+4, 'CT', '#2563EB', '11', 'start');
      t.setAttribute('font-weight','700'); g.appendChild(t);
    }

    // ── 위탁/입양 자녀 표시 (도형 위에 기호) ──
    if(mark === 'child-foster') {
      // 점선 외곽선
      const h = makeShape(n.sex, n.x, n.y, R+5, 'none', '#F59E0B', '2');
      h.setAttribute('stroke-dasharray','4,3'); g.appendChild(h);
    }
    if(mark === 'child-adopted') {
      // 실선 이중 외곽선 (약간 두꺼운 추가선)
      const h = makeShape(n.sex, n.x, n.y, R+5, 'none', '#2563EB', '1.5');
      g.appendChild(h);
    }

    // ── 이름·나이·메모 텍스트 ──
    const ny = n.y + R + (n.ct ? 14 : 8);
    if(n.name) g.appendChild(svgTxt(n.x, ny+13, n.name + (n.age ? ` (${n.age})` : ''), '#334155', '13', 'middle'));
    if(n.note) g.appendChild(svgTxt(n.x, ny + (n.name ? 28 : 13), n.note, '#94A3B8', '11', 'middle'));

    g.addEventListener('pointerdown', e => onPointerDownNode(e, n.id), {passive:false});
    nodesLayer.appendChild(g);
  });
}

/* 반쪽/1/4 채움 헬퍼 */
function drawQuarterFill(g, n, quadrant, color) {
  if(n.sex === 'female') {
    // 원: clipPath 대신 arc path
    const r = R;
    let path;
    if(quadrant === 'top-left')      path = `M${n.x},${n.y} L${n.x-r},${n.y} A${r},${r} 0 0,1 ${n.x},${n.y-r} Z`;
    else if(quadrant === 'top-right') path = `M${n.x},${n.y} L${n.x},${n.y-r} A${r},${r} 0 0,1 ${n.x+r},${n.y} Z`;
    else if(quadrant === 'bottom-right') path = `M${n.x},${n.y} L${n.x+r},${n.y} A${r},${r} 0 0,1 ${n.x},${n.y+r} Z`;
    else path = `M${n.x},${n.y} L${n.x},${n.y+r} A${r},${r} 0 0,1 ${n.x-r},${n.y} Z`;
    g.appendChild(svgEl('path', {d:path, fill:color, stroke:'none'}));
  } else {
    // 사각형(남성/미상): 1/4 rect
    const r = R;
    let rx=n.x, ry=n.y, rw=r, rh=r;
    if(quadrant==='top-left')       { rx=n.x-r; ry=n.y-r; }
    else if(quadrant==='top-right') { rx=n.x;   ry=n.y-r; }
    else if(quadrant==='bottom-right'){ rx=n.x;  ry=n.y;   }
    else                            { rx=n.x-r; ry=n.y;   }
    g.appendChild(svgEl('rect', {x:rx, y:ry, width:rw, height:rh, fill:color, stroke:'none'}));
  }
}

function renderEdges() {
  edgesLayer.innerHTML = '';
  coupleLayer.innerHTML = '';

  /* ── 직계가족 ── */
  edges.filter(e => e.type==='family').forEach(fe => {
    const pars = (fe.parents||[]).map(id => nodes.find(n=>n.id===id)).filter(Boolean);
    const chs  = (fe.children||[]).map(id => nodes.find(n=>n.id===id)).filter(Boolean);
    if(!pars.length || !chs.length) return;
    const px = pars.length===2 ? (pars[0].x+pars[1].x)/2 : pars[0].x;
    const py = pars.length===2 ? (pars[0].y+pars[1].y)/2 : pars[0].y;
    // 부부 관계선 → coupleLayer (관계선보다 아래 레이어)
    if(pars.length===2) {
      const a=pars[0], b=pars[1];
      const ct = fe.coupleType || 'marriage';
      const ddx=b.x-a.x, ddy=b.y-a.y, llen=Math.hypot(ddx,ddy)||1;
      const nnx=ddy/llen, nny2=-ddx/llen;
      const mmx=(a.x+b.x)/2, mmy=(a.y+b.y)/2;
      const CL = coupleLayer; // 부부선은 coupleLayer에 그림
      if(ct==='none') {
        // 선 없음
      } else if(ct==='marriage') {
        CL.appendChild(svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'2','stroke-linecap':'round'}));
      } else if(ct==='cohabit') {
        const l=svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'2','stroke-linecap':'round'});
        l.setAttribute('stroke-dasharray','6,4'); CL.appendChild(l);
        CL.appendChild(svgTxt(mmx,mmy-12,'동거','#64748B','10','middle'));
      } else if(ct==='separated') {
        CL.appendChild(svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#94A3B8','stroke-width':'2','stroke-linecap':'round'}));
        CL.appendChild(svgEl('line',{x1:mmx-nnx*9,y1:mmy-nny2*9,x2:mmx+nnx*9,y2:mmy+nny2*9,stroke:'#94A3B8','stroke-width':'2.5','stroke-linecap':'round'}));
        CL.appendChild(svgTxt(mmx,mmy-14,'벌거','#94A3B8','10','middle'));
      } else if(ct==='divorce') {
        CL.appendChild(svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#94A3B8','stroke-width':'2','stroke-linecap':'round'}));
        [-7,7].forEach(off=>{
          const bx2=mmx+ddx/llen*off, by2=mmy+ddy/llen*off;
          CL.appendChild(svgEl('line',{x1:bx2-nnx*9,y1:by2-nny2*9,x2:bx2+nnx*9,y2:by2+nny2*9,stroke:'#94A3B8','stroke-width':'2.5','stroke-linecap':'round'}));
        });
        CL.appendChild(svgTxt(mmx,mmy-14,'이혼','#94A3B8','10','middle'));
      } else if(ct==='remarry') {
        CL.appendChild(svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'2','stroke-linecap':'round'}));
        [-14,14].forEach(off=>{
          const bx2=mmx+ddx/llen*off, by2=mmy+ddy/llen*off;
          CL.appendChild(svgEl('line',{x1:bx2-nnx*9,y1:by2-nny2*9,x2:bx2+nnx*9,y2:by2+nny2*9,stroke:'#94A3B8','stroke-width':'2','stroke-linecap':'round'}));
        });
        const bx3=mmx+ddx/llen*26, by3=mmy+ddy/llen*26;
        CL.appendChild(svgEl('line',{x1:bx3-nnx*9,y1:by3-nny2*9,x2:bx3+nnx*9,y2:by3+nny2*9,stroke:'#334155','stroke-width':'2.5','stroke-linecap':'round'}));
        CL.appendChild(svgTxt(mmx,mmy-14,'재결합','#334155','10','middle'));
      } else {
        CL.appendChild(svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'2','stroke-linecap':'round'}));
      }
    }
    // 부부선 중간점(px, py)에서 자녀 수평선까지 수직 연결
    const childTopY = Math.min(...chs.map(c => c.y));
    const horizY = Math.max(py + 50, childTopY - R - 16);
    const cxs = chs.map(c => c.x);
    edgesLayer.appendChild(svgEl('line', {x1:px, y1:py, x2:px, y2:horizY, stroke:'#334155','stroke-width':'1.8','stroke-linecap':'round'}));
    if(chs.length>1) edgesLayer.appendChild(svgEl('line', {x1:Math.min(...cxs), y1:horizY, x2:Math.max(...cxs), y2:horizY, stroke:'#334155','stroke-width':'1.8','stroke-linecap':'round'}));
    chs.forEach(c => {
      const mark = c.mark || '';
      if(mark === 'child-foster') {
        const vline = svgEl('line', {x1:c.x,y1:horizY,x2:c.x,y2:c.y-R-2,stroke:'#F59E0B','stroke-width':'2','stroke-linecap':'round'});
        vline.setAttribute('stroke-dasharray','5,4'); edgesLayer.appendChild(vline);
      } else if(mark === 'child-adopted') {
        const midY = (horizY + c.y-R-2)/2;
        edgesLayer.appendChild(svgEl('path', {d:`M${c.x},${horizY} L${c.x-8},${midY} L${c.x},${c.y-R-2}`,fill:'none',stroke:'#2563EB','stroke-width':'2','stroke-linejoin':'round','stroke-linecap':'round'}));
      } else {
        edgesLayer.appendChild(svgEl('line', {x1:c.x,y1:horizY,x2:c.x,y2:c.y-R-2,stroke:'#334155','stroke-width':'1.8','stroke-linecap':'round'}));
      }
    });
  });

  /* ── 관계선 ── */
  edges.filter(e => e.type!=='family').forEach(e => {
    const a = nodes.find(n=>n.id===e.a), b = nodes.find(n=>n.id===e.b);
    if(!a||!b) return;
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
    const nx=dy/len, ny2=-dx/len;
    const type = e.type;

    if(type==='close') {
      [3,-3].forEach(off => {
        edgesLayer.appendChild(svgEl('line', {x1:a.x+nx*off,y1:a.y+ny2*off,x2:b.x+nx*off,y2:b.y+ny2*off,stroke:'#059669','stroke-width':'1.8','stroke-linecap':'round'}));
      });
    } else if(type==='distant') {
      const l = svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#94A3B8','stroke-width':'2','stroke-linecap':'round'});
      l.setAttribute('stroke-dasharray','4,4'); edgesLayer.appendChild(l);
    } else if(type==='enmesh') {
      [-4,0,4].forEach(off => {
        edgesLayer.appendChild(svgEl('line', {x1:a.x+nx*off,y1:a.y+ny2*off,x2:b.x+nx*off,y2:b.y+ny2*off,stroke:'#059669','stroke-width':'1.8','stroke-linecap':'round'}));
      });
    } else if(type==='cut') {
      edgesLayer.appendChild(svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#64748B','stroke-width':'2','stroke-linecap':'round'}));
      [-6,6].forEach(off => {
        const bx=mx+dx/len*off, by=my+dy/len*off;
        edgesLayer.appendChild(svgEl('line', {x1:bx-nx*8,y1:by-ny2*8,x2:bx+nx*8,y2:by+ny2*8,stroke:'#64748B','stroke-width':'2.5','stroke-linecap':'round'}));
      });
    } else if(type==='conflict') {
      drawZigzag(a.x,a.y,b.x,b.y,'#EF4444','2');
    } else if(type==='fused-conflict') {
      [3,-3].forEach(off => {
        edgesLayer.appendChild(svgEl('line', {x1:a.x+nx*off,y1:a.y+ny2*off,x2:b.x+nx*off,y2:b.y+ny2*off,stroke:'#059669','stroke-width':'1.8'}));
      });
      drawZigzag(a.x+nx*8,a.y+ny2*8,b.x+nx*8,b.y+ny2*8,'#EF4444','1.5');
    } else if(type==='hostile') {
      [3,-3].forEach(off => {
        edgesLayer.appendChild(svgEl('line', {x1:a.x+nx*off,y1:a.y+ny2*off,x2:b.x+nx*off,y2:b.y+ny2*off,stroke:'#059669','stroke-width':'1.8'}));
      });
      drawZigzag(a.x,a.y,b.x,b.y,'#EF4444','1.5');
    } else if(type==='marriage') {
      edgesLayer.appendChild(svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'2.2','stroke-linecap':'round'}));
    } else if(type==='separated') {
      edgesLayer.appendChild(svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#94A3B8','stroke-width':'2.2','stroke-linecap':'round'}));
      edgesLayer.appendChild(svgEl('line', {x1:mx-nx*9,y1:my-ny2*9,x2:mx+nx*9,y2:my+ny2*9,stroke:'#94A3B8','stroke-width':'2.5','stroke-linecap':'round'}));
      edgesLayer.appendChild(svgTxt(mx, my-14, '벌거', '#94A3B8', '10', 'middle'));
    } else if(type==='divorce') {
      edgesLayer.appendChild(svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#94A3B8','stroke-width':'2.2','stroke-linecap':'round'}));
      [-7,7].forEach(off => {
        const bx=mx+dx/len*off, by=my+dy/len*off;
        edgesLayer.appendChild(svgEl('line', {x1:bx-nx*9,y1:by-ny2*9,x2:bx+nx*9,y2:by+ny2*9,stroke:'#94A3B8','stroke-width':'2.5','stroke-linecap':'round'}));
      });
      edgesLayer.appendChild(svgTxt(mx, my-14, '이혼', '#94A3B8', '10', 'middle'));
    } else if(type==='remarry') {
      edgesLayer.appendChild(svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'2.2','stroke-linecap':'round'}));
      [-14,14].forEach(off => {
        const bx=mx+dx/len*off, by=my+dy/len*off;
        edgesLayer.appendChild(svgEl('line', {x1:bx-nx*9,y1:by-ny2*9,x2:bx+nx*9,y2:by+ny2*9,stroke:'#94A3B8','stroke-width':'2','stroke-linecap':'round'}));
      });
      const bx2=mx+dx/len*26, by2=my+dy/len*26;
      edgesLayer.appendChild(svgEl('line', {x1:bx2-nx*9,y1:by2-ny2*9,x2:bx2+nx*9,y2:by2+ny2*9,stroke:'#334155','stroke-width':'2.5','stroke-linecap':'round'}));
      edgesLayer.appendChild(svgTxt(mx, my-14, '재결합', '#334155', '10', 'middle'));
    } else {
      edgesLayer.appendChild(svgEl('line', {x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#334155','stroke-width':'1.5','stroke-linecap':'round'}));
    }
  });
}

/* 지그재그 (갈등선) */
function drawZigzag(x1,y1,x2,y2,color,sw) {
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len, nx=uy, ny=-ux;
  const amp=7, step=14;
  const steps = Math.max(2, Math.floor(len/step));
  let pts = [];
  for(let i=0;i<=steps;i++) {
    const t=i/steps;
    const cx=x1+t*dx, cy=y1+t*dy;
    const side=(i%2===0)?1:-1;
    pts.push(`${cx+nx*amp*side},${cy+ny*amp*side}`);
  }
  edgesLayer.appendChild(svgEl('polyline', {points:pts.join(' '),fill:'none',stroke:color,'stroke-width':sw,'stroke-linecap':'round','stroke-linejoin':'round'}));
}

/* ── 동거 그룹 렌더링 ── */
function renderGroups() {
  groupsLayer.innerHTML = '';
  groups.forEach(gr => {
    const members = gr.members.map(id => nodes.find(n=>n.id===id)).filter(Boolean);
    if(!members.length) return;
    const pad = 44;
    const xs = members.map(m=>m.x), ys = members.map(m=>m.y);
    const minX=Math.min(...xs)-pad, maxX=Math.max(...xs)+pad;
    const minY=Math.min(...ys)-pad, maxY=Math.max(...ys)+pad;
    const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
    const rx=Math.max((maxX-minX)/2, 30), ry=Math.max((maxY-minY)/2, 30);
    const el = svgEl('ellipse',{cx,cy,rx,ry,fill:'rgba(99,102,241,0.04)',stroke:'#64748B','stroke-width':'2','stroke-dasharray':'6,4'});
    groupsLayer.appendChild(el);
    if(gr.label) {
      const t = svgTxt(cx, minY-8, gr.label, '#64748B', '12', 'middle');
      t.setAttribute('font-weight','600'); groupsLayer.appendChild(t);
    }
    // 삭제 버튼 (×)
    const gDel = svgEl('g',{cursor:'pointer'});
    gDel.appendChild(svgEl('circle',{cx:cx+rx-2,cy:minY+2,r:'10',fill:'#fff',stroke:'#CBD5E1','stroke-width':'1'}));
    const xt = svgTxt(cx+rx-2, minY+6, '×', '#94A3B8', '14', 'middle');
    gDel.appendChild(xt);
    gDel.addEventListener('click', ev => { ev.stopPropagation(); saveHist(); groups=groups.filter(g=>g.id!==gr.id); render(); saveGeno(); });
    groupsLayer.appendChild(gDel);
  });
  // 그룹 모드 중 선택된 멤버 하이라이트
  if(groupMode && groupMembers.length) {
    groupMembers.forEach(id => {
      const n = nodes.find(n=>n.id===id);
      if(!n) return;
      const h = makeShape(n.sex, n.x, n.y, R+8, 'rgba(99,102,241,0.15)', '#6366F1', '2');
      groupsLayer.appendChild(h);
    });
  }
}

/* ── 동거 그룹 모드 ── */
function startCohabGroup() {
  if(groupMode) { cancelCohabGroup(); return; }
  groupMode = true; groupMembers = [];
  cancelRel();
  document.getElementById('rb-cohabgroup').classList.add('active');
  document.getElementById('rel-toast-text').textContent = '동거 그룹에 포함할 구성원을 클릭하세요';
  document.getElementById('rel-toast-btn').style.display = 'none';
  document.getElementById('rel-toast-btn').onclick = commitCohabGroup;
  document.getElementById('rel-toast').classList.add('show');
  document.getElementById('cancel-rel').style.display = 'block';
  document.getElementById('cancel-rel').onclick = cancelCohabGroup;
  closeEdit();
}
function cancelCohabGroup() {
  groupMode = false; groupMembers = [];
  document.getElementById('rb-cohabgroup').classList.remove('active');
  document.getElementById('rel-toast').classList.remove('show');
  document.getElementById('cancel-rel').style.display = 'none';
  document.getElementById('cancel-rel').onclick = cancelRel;
  document.getElementById('rel-toast-btn').onclick = commitFamily;
  render();
}
function commitCohabGroup() {
  if(!groupMembers.length) { cancelCohabGroup(); return; }
  saveHist();
  const label = prompt('그룹 라벨을 입력하세요 (생략 가능)', '동거') ?? '동거';
  groups.push({ id: groupId++, members: [...groupMembers], label });
  cancelCohabGroup(); render(); saveGeno();
}

/* ── JPG 내보내기 ── */
function exportJPG() {
  const c = cases[currentId];
  // 현재 뷰포트 transform 제거 후 전체 콘텐츠 기준으로 bbox 계산
  [nodesLayer, edgesLayer, groupsLayer, coupleLayer].forEach(l => l.setAttribute('transform',''));

  // 콘텐츠 범위 계산
  const allX = nodes.map(n => n.x);
  const allY = nodes.map(n => n.y);
  if(!allX.length) {
    [nodesLayer, edgesLayer, groupsLayer, coupleLayer].forEach(l => l.setAttribute('transform', `translate(${vpX},${vpY}) scale(${vpScale})`));
    alert('가계도에 구성원이 없습니다.'); return;
  }
  const pad = 60;
  const minX = Math.min(...allX) - pad - R;
  const minY = Math.min(...allY) - pad - R;
  const maxX = Math.max(...allX) + pad + R + 60;
  const maxY = Math.max(...allY) + pad + R + 40;
  const w = maxX - minX;
  const h = maxY - minY;

  // SVG를 해당 범위로 직렬화
  const origVB = canvas.getAttribute('viewBox');
  canvas.setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
  canvas.setAttribute('width', w);
  canvas.setAttribute('height', h);

  const svgStr = new XMLSerializer().serializeToString(canvas);

  // viewBox 원복
  if(origVB) canvas.setAttribute('viewBox', origVB);
  else canvas.removeAttribute('viewBox');
  canvas.removeAttribute('width');
  canvas.removeAttribute('height');
  [nodesLayer, edgesLayer, groupsLayer, coupleLayer].forEach(l => l.setAttribute('transform', `translate(${vpX},${vpY}) scale(${vpScale})`));

  // Canvas에 렌더링
  const img = new Image();
  const svgBlob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    const cvs = document.createElement('canvas');
    const scale = 2; // 고해상도
    cvs.width = w * scale;
    cvs.height = h * scale;
    const ctx = cvs.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `가계도_${c?.name||'unknown'}_${new Date().toISOString().slice(0,10)}.jpg`;
    a.href = cvs.toDataURL('image/jpeg', 0.95);
    a.click();
  };
  img.src = url;
}

/* ── SVG 내보내기 ── */
function exportSVG() {
  const c = cases[currentId];
  [nodesLayer, edgesLayer, groupsLayer, coupleLayer].forEach(l => l.setAttribute('transform',''));
  const s = new XMLSerializer().serializeToString(canvas);
  [nodesLayer, edgesLayer, groupsLayer, coupleLayer].forEach(l => l.setAttribute('transform', `translate(${vpX},${vpY}) scale(${vpScale})`));
  const b = new Blob([s], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `가계도_${c?.name||'unknown'}_${new Date().toISOString().slice(0,10)}.svg`;
  a.click();
}
