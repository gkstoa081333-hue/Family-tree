<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계도 관리 시스템 | 공주시정신건강복지센터</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
:root {
  --primary: #2563EB;
  --primary-light: #EFF6FF;
  --primary-dark: #1D4ED8;
  --accent: #0EA5E9;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --border-strong: #CBD5E1;
  --text: #0F172A;
  --text-2: #475569;
  --text-3: #94A3B8;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }

/* ── 레이아웃 ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── 좌측 사이드바 ── */
#sidebar {
  width: 260px; min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--primary);
  color: #fff;
}
#sidebar-header h1 { font-size: 15px; font-weight: 700; }
#sidebar-header p  { font-size: 11px; opacity: .75; margin-top: 2px; }

#case-list-wrap { flex: 1; overflow-y: auto; padding: 8px; }

.section-title {
  font-size: 10px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 8px 4px;
}

.case-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; border-radius: var(--radius);
  cursor: pointer; transition: background .15s;
  border: 1px solid transparent;
}
.case-item:hover { background: var(--bg); }
.case-item.active {
  background: var(--primary-light);
  border-color: #BFDBFE;
}
.case-item .avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--primary); color: #fff;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.case-item .info { flex: 1; min-width: 0; }
.case-item .info .name { font-weight: 600; font-size: 13px; truncate: ellipsis; white-space: nowrap; overflow: hidden; }
.case-item .info .sub  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.case-item .del-btn {
  opacity: 0; font-size: 12px; color: var(--text-3);
  background: none; border: none; cursor: pointer; padding: 2px 4px;
  border-radius: 4px; transition: all .15s;
}
.case-item:hover .del-btn { opacity: 1; }
.case-item .del-btn:hover { color: var(--danger); background: #FEF2F2; }

#sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: all .15s; font-family: var(--font);
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
.btn-outline:hover { background: var(--bg); }
.btn-danger  { background: #FEF2F2; color: var(--danger); border-color: #FECACA; }
.btn-danger:hover { background: #FEE2E2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* ── 메인 영역 ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#top-bar {
  height: 56px; min-height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
}
#top-bar h2 { font-size: 16px; font-weight: 700; flex: 1; }
#top-bar .badge {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: var(--primary-light); color: var(--primary); font-weight: 600;
}

/* ── 탭 ── */
#tab-bar {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; gap: 0;
}
.tab {
  padding: 12px 16px; font-size: 13px; font-weight: 500;
  color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s; white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ── 탭 콘텐츠 ── */
.tab-content { flex: 1; overflow: hidden; display: none; }
.tab-content.active { display: flex; flex-direction: column; }

/* ── 가계도 탭 ── */
#genogram-tab { flex-direction: row; }

#geno-toolbar {
  width: 200px; min-width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 12px; display: flex; flex-direction: column; gap: 8px;
  overflow-y: auto;
}
.tool-section { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; padding: 6px 0 3px; }
.tool-btn-g {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; font-size: 12px; color: var(--text);
  transition: all .15s; text-align: left; width: 100%; font-family: var(--font);
}
.tool-btn-g:hover { background: var(--bg); border-color: var(--border-strong); }
.tool-btn-g.rel-active { background: var(--primary-light); border-color: #93C5FD; color: var(--primary); font-weight: 600; }

#geno-canvas-wrap { flex: 1; position: relative; background: #FAFBFC; overflow: hidden; }
#geno-canvas-wrap svg { width: 100%; height: 100%; }

#rel-guide {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: #fff; border-radius: 24px;
  padding: 8px 20px; font-size: 13px; font-weight: 500;
  display: none; white-space: nowrap; pointer-events: none; z-index: 10;
  box-shadow: var(--shadow-md);
}
#rel-guide.show { display: block; }

/* 편집 패널 */
#edit-panel {
  position: absolute; top: 10px; right: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; width: 190px;
  display: none; flex-direction: column; gap: 9px;
  box-shadow: var(--shadow-md); z-index: 20;
}
#edit-panel.show { display: flex; }
#edit-panel label { font-size: 11px; color: var(--text-2); font-weight: 500; }
#edit-panel input, #edit-panel select {
  width: 100%; padding: 6px 9px;
  border: 1px solid var(--border); border-radius: 7px;
  font-size: 13px; color: var(--text); background: var(--surface);
  font-family: var(--font);
}
#edit-panel input:focus, #edit-panel select:focus { outline: none; border-color: var(--primary); }
.ep-row { display: flex; justify-content: space-between; align-items: center; }
.ep-title { font-size: 13px; font-weight: 700; }

/* ── 사례 정보 탭 ── */
#info-tab { padding: 20px; overflow-y: auto; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1/-1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-2); }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: var(--font); color: var(--text);
  background: var(--surface); transition: border .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.card-title span { font-size: 16px; }

/* ── 메모 탭 ── */
#memo-tab { padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.memo-input-area { display: flex; gap: 10px; }
.memo-input-area textarea {
  flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: var(--font); resize: none; height: 80px;
}
.memo-input-area textarea:focus { outline: none; border-color: var(--primary); }
.memo-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; gap: 10px; align-items: flex-start;
}
.memo-item .memo-date { font-size: 11px; color: var(--text-3); white-space: nowrap; }
.memo-item .memo-text { flex: 1; font-size: 13px; line-height: 1.6; }
.memo-item .memo-del { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 12px; padding: 2px; }
.memo-item .memo-del:hover { color: var(--danger); }

/* ── 빈 상태 ── */
#empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--text-3);
}
#empty-state .icon { font-size: 48px; opacity: .5; }
#empty-state p { font-size: 14px; }

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: 14px;
  padding: 24px; width: 380px; box-shadow: var(--shadow-md);
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal .form-group { margin-bottom: 12px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── 상태 ── */
#sync-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-3); padding: 4px 10px;
  border-radius: 20px; background: var(--bg); border: 1px solid var(--border);
}
#sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
#sync-dot.ok   { background: var(--success); }
#sync-dot.err  { background: var(--danger); }
#sync-dot.sync { background: var(--warning); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.empty-cases { text-align: center; padding: 24px 12px; color: var(--text-3); font-size: 12px; }

/* 스크롤바 */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">

  <!-- ── 좌측 사이드바: 사례 목록 ── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>🏥 가계도 관리 시스템</h1>
      <p>공주시정신건강복지센터</p>
    </div>

    <div id="case-list-wrap">
      <div class="section-title">사례 목록</div>
      <div id="case-list">
        <div class="empty-cases">사례를 추가해 주세요</div>
      </div>
    </div>

    <div id="sidebar-footer" style="flex-direction:column;gap:8px">
      <button class="btn btn-primary btn-full" onclick="openNewCaseModal()">+ 새 사례 추가</button>
      <div id="sync-status">
        <div id="sync-dot"></div>
        <span id="sync-text">연결 중...</span>
      </div>
    </div>
  </div>

  <!-- ── 메인 ── -->
  <div id="main">

    <!-- 빈 상태 -->
    <div id="empty-state">
      <div class="icon">📋</div>
      <p>좌측에서 사례를 선택하거나 새 사례를 추가하세요</p>
    </div>

    <!-- 사례 선택 시 -->
    <div id="case-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none">

      <div id="top-bar">
        <h2 id="case-title">-</h2>
        <span class="badge" id="case-badge">-</span>
        <button class="btn btn-outline btn-sm" onclick="exportSVG()">⬇ SVG 저장</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentCase()">삭제</button>
      </div>

      <div id="tab-bar">
        <div class="tab active" onclick="switchTab('genogram')">🧬 가계도</div>
        <div class="tab" onclick="switchTab('info')">📄 사례 정보</div>
        <div class="tab" onclick="switchTab('memo')">📝 메모</div>
      </div>

      <!-- 가계도 탭 -->
      <div id="genogram-tab" class="tab-content active">
        <div id="geno-toolbar">
          <div class="tool-section">구성원 추가</div>
          <button class="tool-btn-g" onclick="addNode('male')">
            <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>남성
          </button>
          <button class="tool-btn-g" onclick="addNode('female')">
            <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>여성
          </button>
          <button class="tool-btn-g" onclick="addNode('unknown')">
            <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,1 15,15 1,15" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>성별미상
          </button>

          <div class="tool-section" style="margin-top:6px">관계선</div>
          <div style="font-size:10px;color:var(--text-3);line-height:1.6;padding:2px 0 4px">
            ① 관계선 선택 → ② 첫 번째 클릭 → ③ 두 번째 클릭<br>
            <b style="color:var(--primary)">SHIFT+클릭</b>: 연속모드 | ESC: 취소
          </div>
          <button class="tool-btn-g" id="rb-family" onclick="startRel('family')" style="background:var(--primary-light);border-color:#93C5FD;color:var(--primary);font-weight:700;margin-bottom:2px">
            ⬛○ 직계가족 연결 ★
          </button>
          <div style="font-size:10px;color:var(--text-3);padding:0 4px 6px;line-height:1.6;border-bottom:1px solid var(--border);margin-bottom:4px">
            부모(1~2명) 선택 후 자녀를 여러 명 클릭<br>Enter 키로 연결 완료
          </div>
          <button class="tool-btn-g" id="rb-marriage"  onclick="startRel('marriage')">━━ 결혼</button>
          <button class="tool-btn-g" id="rb-divorce"   onclick="startRel('divorce')">╌╌ 이혼</button>
          <button class="tool-btn-g" id="rb-cohabit"   onclick="startRel('cohabit')">┄┄ 동거</button>
          <button class="tool-btn-g" id="rb-close"     onclick="startRel('close')">≋ 밀착</button>
          <button class="tool-btn-g" id="rb-conflict"  onclick="startRel('conflict')">╳ 갈등</button>
          <button class="tool-btn-g" id="rb-cut"       onclick="startRel('cut')">‥ 단절</button>

          <div class="tool-section" style="margin-top:6px">편집</div>
          <button class="tool-btn-g" onclick="undoAction()">↩ 실행 취소</button>
          <button class="tool-btn-g" onclick="clearGenogram()">🗑 가계도 초기화</button>
        </div>

        <div id="geno-canvas-wrap">
          <svg id="geno-canvas" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M1 1L9 5L1 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </marker>
            </defs>
            <g id="edges-layer"></g>
            <g id="nodes-layer"></g>
          </svg>
          <div id="rel-guide" style="display:flex;align-items:center;gap:10px">
            <span id="guide-text">첫 번째 구성원을 클릭하세요</span>
            <button id="guide-enter-btn" onclick="commitFamily()" style="display:none;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:12px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:sans-serif">Enter 완료</button>
            <span style="opacity:.6;font-size:11px">ESC 취소</span>
          </div>
          <!-- 편집 패널 -->
          <div id="edit-panel">
            <div class="ep-row">
              <span class="ep-title">정보 편집</span>
              <button class="btn btn-outline btn-sm" onclick="closeEdit()" style="padding:3px 8px;font-size:11px">✕</button>
            </div>
            <div>
              <label>이름</label>
              <input id="ep-name" type="text" placeholder="이름" oninput="updateNode()">
            </div>
            <div>
              <label>나이</label>
              <input id="ep-age" type="text" placeholder="나이" oninput="updateNode()">
            </div>
            <div>
              <label>특이사항</label>
              <input id="ep-note" type="text" placeholder="직업, 진단명 등" oninput="updateNode()">
            </div>
            <div>
              <label>특수표시</label>
              <select id="ep-mark" onchange="updateNode()">
                <option value="">없음</option>
                <option value="deceased">사망 (X)</option>
                <option value="ip">IP (밑줄)</option>
                <option value="addicted">중독 (●)</option>
                <option value="abuse">학대/폭력 (▲)</option>
              </select>
            </div>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-2)">
              <input type="checkbox" id="ep-ct" onchange="updateNode()">
              CT 본인 (이중선)
            </label>
            <button class="btn btn-danger btn-full btn-sm" onclick="deleteSelectedNode()">이 구성원 삭제</button>
          </div>
        </div>
      </div>

      <!-- 사례 정보 탭 -->
      <div id="info-tab" class="tab-content">
        <div class="card">
          <div class="card-title"><span>👤</span> 기본 정보</div>
          <div class="form-grid">
            <div class="form-group"><label>CT 성명</label><input id="fi-name" type="text" oninput="saveInfo()"></div>
            <div class="form-group"><label>생년월일</label><input id="fi-birth" type="text" placeholder="YYYY-MM-DD" oninput="saveInfo()"></div>
            <div class="form-group"><label>성별</label>
              <select id="fi-sex" onchange="saveInfo()">
                <option value="">선택</option><option>남</option><option>여</option>
              </select>
            </div>
            <div class="form-group"><label>연락처</label><input id="fi-tel" type="text" oninput="saveInfo()"></div>
            <div class="form-group full"><label>주소</label><input id="fi-addr" type="text" oninput="saveInfo()"></div>
            <div class="form-group"><label>담당 사회복지사</label><input id="fi-sw" type="text" oninput="saveInfo()"></div>
            <div class="form-group"><label>사례 등록일</label><input id="fi-date" type="date" oninput="saveInfo()"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><span>🏥</span> 진단 및 서비스</div>
          <div class="form-grid">
            <div class="form-group"><label>주요 진단명</label><input id="fi-diag" type="text" oninput="saveInfo()"></div>
            <div class="form-group"><label>서비스 유형</label>
              <select id="fi-svc" onchange="saveInfo()">
                <option value="">선택</option>
                <option>집중사례관리</option><option>일반사례관리</option>
                <option>위기개입</option><option>정보제공</option><option>종결</option>
              </select>
            </div>
            <div class="form-group full"><label>주요 의뢰 사유</label><textarea id="fi-reason" oninput="saveInfo()"></textarea></div>
            <div class="form-group full"><label>현재 상황 요약</label><textarea id="fi-summary" oninput="saveInfo()"></textarea></div>
          </div>
        </div>
      </div>

      <!-- 메모 탭 -->
      <div id="memo-tab" class="tab-content">
        <div class="card" style="margin-bottom:0">
          <div class="card-title"><span>📝</span> 메모 추가</div>
          <div class="memo-input-area">
            <textarea id="memo-input" placeholder="상담 메모, 특이사항 등을 입력하세요..."></textarea>
            <button class="btn btn-primary" onclick="addMemo()" style="align-self:flex-end">추가</button>
          </div>
        </div>
        <div id="memo-list" style="display:flex;flex-direction:column;gap:8px;margin-top:4px"></div>
      </div>

    </div>
  </div>
</div>

<!-- 새 사례 모달 -->
<div class="modal-overlay" id="new-case-modal">
  <div class="modal">
    <h3>새 사례 추가</h3>
    <div class="form-group">
      <label>CT 성명 *</label>
      <input id="nc-name" type="text" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label>담당 사회복지사</label>
      <input id="nc-sw" type="text" placeholder="담당자 이름">
    </div>
    <div class="form-group">
      <label>사례 등록일</label>
      <input id="nc-date" type="date">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeNewCaseModal()">취소</button>
      <button class="btn btn-primary" onclick="createCase()">추가</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════
   Firebase 설정 — 기존 재고관리와 동일 프로젝트
   ════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyExample-replace-with-your-key",
  authDomain: "gongju-inventory.firebaseapp.com",
  databaseURL: "https://gongju-inventory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gongju-inventory",
  storageBucket: "gongju-inventory.appspot.com",
  messagingSenderId: "000000000000",
  appId: "1:000000000000:web:0000000000000000"
};

let db = null;
let firebaseOK = false;

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  firebaseOK = true;
} catch(e) {
  console.warn('Firebase 초기화 실패, 로컬 모드로 동작:', e);
}

/* ── 상태 표시 ── */
function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = state; txt.textContent = text;
}

/* ════════════════════════════════════
   사례 데이터
   ════════════════════════════════════ */
let cases = {};      // { caseId: { id, name, sw, date, info:{}, memos:[], genogram:{nodes,edges} } }
let currentCaseId = null;

// Firebase 또는 localStorage
function dbRef(path) {
  if (firebaseOK && db) return db.ref('genogram/' + path);
  return null;
}

function localSave() {
  try { localStorage.setItem('genogram_cases', JSON.stringify(cases)); } catch(e) {}
}
function localLoad() {
  try {
    const d = localStorage.getItem('genogram_cases');
    if (d) cases = JSON.parse(d);
  } catch(e) {}
}

/* 초기 로드 */
function initData() {
  if (firebaseOK && db) {
    setSyncStatus('sync', '연결 중...');
    db.ref('genogram/cases').on('value', snap => {
      cases = snap.val() || {};
      renderCaseList();
      setSyncStatus('ok', 'Firebase 연결됨');
    }, err => {
      console.warn('Firebase 읽기 실패, 로컬 사용:', err);
      firebaseOK = false;
      localLoad(); renderCaseList();
      setSyncStatus('err', '로컬 저장 모드');
    });
  } else {
    localLoad(); renderCaseList();
    setSyncStatus('err', '로컬 저장 모드');
  }
}

function saveCaseToDB(caseId) {
  const c = cases[caseId]; if (!c) return;
  if (firebaseOK && db) {
    setSyncStatus('sync', '저장 중...');
    db.ref('genogram/cases/' + caseId).set(c)
      .then(() => setSyncStatus('ok', '저장 완료'))
      .catch(() => { localSave(); setSyncStatus('err', '로컬 저장됨'); });
  } else {
    localSave();
  }
}

function deleteCaseFromDB(caseId) {
  if (firebaseOK && db) {
    db.ref('genogram/cases/' + caseId).remove();
  } else {
    delete cases[caseId]; localSave();
  }
}

/* ── 사례 목록 렌더 ── */
function renderCaseList() {
  const el = document.getElementById('case-list');
  const ids = Object.keys(cases);
  if (!ids.length) { el.innerHTML = '<div class="empty-cases">사례가 없습니다</div>'; return; }
  el.innerHTML = ids.map(id => {
    const c = cases[id];
    const initials = (c.name||'?').slice(0,2);
    const active = id === currentCaseId ? 'active' : '';
    return `<div class="case-item ${active}" onclick="selectCase('${id}')">
      <div class="avatar">${initials}</div>
      <div class="info">
        <div class="name">${c.name||'이름없음'}</div>
        <div class="sub">${c.sw||'담당자 미지정'} · ${c.date||''}</div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();confirmDeleteCase('${id}')">✕</button>
    </div>`;
  }).join('');
}

/* ── 새 사례 모달 ── */
function openNewCaseModal() {
  document.getElementById('nc-name').value = '';
  document.getElementById('nc-sw').value = '';
  document.getElementById('nc-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('new-case-modal').classList.add('show');
  setTimeout(()=>document.getElementById('nc-name').focus(),100);
}
function closeNewCaseModal() { document.getElementById('new-case-modal').classList.remove('show'); }

function createCase() {
  const name = document.getElementById('nc-name').value.trim();
  if (!name) { alert('CT 성명을 입력하세요.'); return; }
  const id = 'case_' + Date.now();
  cases[id] = {
    id, name,
    sw: document.getElementById('nc-sw').value.trim(),
    date: document.getElementById('nc-date').value,
    info: {}, memos: [],
    genogram: { nodes: [], edges: [] }
  };
  saveCaseToDB(id);
  closeNewCaseModal();
  selectCase(id);
}

function confirmDeleteCase(id) {
  if (!confirm(`"${cases[id]?.name}" 사례를 삭제하시겠습니까?\n(가계도·메모 포함 모두 삭제)`)) return;
  deleteCaseFromDB(id);
  if (!firebaseOK) { delete cases[id]; renderCaseList(); }
  if (currentCaseId === id) { currentCaseId = null; showEmptyState(); }
}
function deleteCurrentCase() { if (currentCaseId) confirmDeleteCase(currentCaseId); }

/* ── 사례 선택 ── */
function selectCase(id) {
  currentCaseId = id;
  renderCaseList();
  loadCaseView();
}

function showEmptyState() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('case-view').style.display = 'none';
}

function loadCaseView() {
  const c = cases[currentCaseId]; if (!c) return;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('case-view').style.display = 'flex';

  document.getElementById('case-title').textContent = c.name || '이름없음';
  document.getElementById('case-badge').textContent = c.sw || '담당자 미지정';

  // 사례 정보 로드
  const info = c.info || {};
  ['name','birth','sex','tel','addr','sw','date','diag','svc','reason','summary'].forEach(k => {
    const el = document.getElementById('fi-'+k);
    if (el) el.value = info[k] || '';
  });

  // 가계도 로드
  const g = c.genogram || { nodes:[], edges:[] };
  nodes = JSON.parse(JSON.stringify(g.nodes || []));
  edges = JSON.parse(JSON.stringify(g.edges || []));
  nodeId = nodes.reduce((m,n)=>Math.max(m,n.id+1),0);
  edgeId = edges.reduce((m,e)=>Math.max(m,e.id+1),0);
  history = [];
  cancelRel(); closeEdit();
  render();

  // 메모 로드
  renderMemos();

  // 탭 첫번째로
  switchTab('genogram');
}

/* ── 탭 전환 ── */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['genogram','info','memo'];
    t.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  document.getElementById(name+'-tab').classList.add('active');
}

/* ── 사례 정보 저장 ── */
let infoTimer = null;
function saveInfo() {
  if (!currentCaseId) return;
  const c = cases[currentCaseId]; if (!c) return;
  if (!c.info) c.info = {};
  ['name','birth','sex','tel','addr','sw','date','diag','svc','reason','summary'].forEach(k => {
    const el = document.getElementById('fi-'+k);
    if (el) c.info[k] = el.value;
  });
  clearTimeout(infoTimer);
  infoTimer = setTimeout(()=>saveCaseToDB(currentCaseId), 1000);
}

/* ════════════════════════════════════
   메모
   ════════════════════════════════════ */
function addMemo() {
  const txt = document.getElementById('memo-input').value.trim();
  if (!txt || !currentCaseId) return;
  const c = cases[currentCaseId];
  if (!c.memos) c.memos = [];
  c.memos.unshift({ id: Date.now(), text: txt, date: new Date().toLocaleString('ko-KR') });
  document.getElementById('memo-input').value = '';
  saveCaseToDB(currentCaseId);
  renderMemos();
}
function deleteMemo(mid) {
  const c = cases[currentCaseId]; if (!c) return;
  c.memos = (c.memos||[]).filter(m=>m.id!==mid);
  saveCaseToDB(currentCaseId);
  renderMemos();
}
function renderMemos() {
  const c = cases[currentCaseId]; if (!c) return;
  const list = c.memos || [];
  document.getElementById('memo-list').innerHTML = list.length
    ? list.map(m=>`<div class="memo-item">
        <div class="memo-text">${m.text.replace(/\n/g,'<br>')}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="memo-date">${m.date}</span>
          <button class="memo-del" onclick="deleteMemo(${m.id})">🗑</button>
        </div>
      </div>`).join('')
    : '<div style="color:var(--text-3);font-size:13px;padding:8px">메모가 없습니다.</div>';
}

/* ════════════════════════════════════
   가계도 엔진
   ════════════════════════════════════ */
const canvas = document.getElementById('geno-canvas');
const nodesLayer = document.getElementById('nodes-layer');
const edgesLayer = document.getElementById('edges-layer');
const relGuide = document.getElementById('rel-guide');
const guideText = document.getElementById('guide-text');
const editPanel = document.getElementById('edit-panel');

let nodes=[], edges=[], selected=null, dragging=null, dragOffset={x:0,y:0}, didDrag=false;
let relMode=null, relFirst=null;
let history=[], nodeId=0, edgeId=0;
const R=22;

const REL_LABELS={family:'직계가족',marriage:'결혼',divorce:'이혼',cohabit:'동거',close:'밀착',conflict:'갈등',cut:'단절'};

function saveHistory() { history.push({n:JSON.stringify(nodes),e:JSON.stringify(edges)}); }
function undoAction() {
  if(!history.length) return;
  const s=history.pop();
  nodes=JSON.parse(s.n); edges=JSON.parse(s.e);
  nodeId=nodes.reduce((m,n)=>Math.max(m,n.id+1),0);
  edgeId=edges.reduce((m,e)=>Math.max(m,e.id+1),0);
  render(); saveGenogram();
}
function clearGenogram() {
  if(!confirm('가계도를 초기화하시겠습니까?')) return;
  saveHistory(); nodes=[]; edges=[]; nodeId=0; edgeId=0;
  closeEdit(); render(); saveGenogram();
}

function addNode(sex) {
  if (!currentCaseId) return;
  saveHistory();
  const w=canvas.clientWidth, h=canvas.clientHeight;
  nodes.push({id:nodeId++,sex,x:80+Math.random()*(w-160),y:60+Math.random()*(h-120),name:'',age:'',note:'',mark:'',ct:false});
  render(); saveGenogram();
}

/* ── 관계선 모드 ──
   edge 구조:
     일반: { id, type, a, b }          → 두 노드 사이 선
     가족: { id, type:'family',
             parents:[id,id],          → 부모 (1~2명)
             children:[id,id,...] }    → 자녀 (1명 이상)
   family edge 의 type 은 'family', coupleType:'marriage'|'divorce'|'cohabit'
*/

let shiftLock = false;   // SHIFT 연속모드 여부

function startRel(type, fromShift=false) {
  relMode=type; relFirst=null; relParents=null; relChildren=[];
  shiftLock = fromShift;
  document.querySelectorAll('.tool-btn-g').forEach(b=>b.classList.remove('rel-active'));
  document.getElementById('rb-'+type)?.classList.add('rel-active');
  updateGuide();
  relGuide.classList.add('show');
  closeEdit();
}
function cancelRel() {
  relMode=null; relFirst=null; relParents=null; relChildren=[];
  shiftLock=false;
  document.querySelectorAll('.tool-btn-g').forEach(b=>b.classList.remove('rel-active'));
  relGuide.classList.remove('show');
  render();
}

// 직계가족 연결 전용 상태
let relParents=null;   // [id] or [id,id]
let relChildren=[];

function updateGuide(){
  const lbl = REL_LABELS[relMode]||relMode;
  const shift = shiftLock ? ' <span style="opacity:.6;font-size:10px;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:8px">SHIFT연속</span>' : '';
  const enterBtn = document.getElementById('guide-enter-btn');
  if(relMode==='family'){
    const canCommit = relParents && relParents.length>=1 && relChildren.length>=1;
    if(enterBtn) enterBtn.style.display = canCommit ? 'block' : 'none';
    if(!relParents)          guideText.innerHTML=`[직계가족] 부모 클릭 (1~2명)${shift}`;
    else if(relParents.length===1 && relChildren.length===0) guideText.innerHTML=`[직계가족] 두 번째 부모 또는 자녀 클릭${shift}`;
    else if(relParents.length>=2 && relChildren.length===0) guideText.innerHTML=`[직계가족] 자녀를 클릭하세요 (여러 명 가능)${shift}`;
    else guideText.innerHTML=`[직계가족] 자녀 ${relChildren.length}명 선택됨 — 더 클릭하거나 Enter${shift}`;
  } else {
    if(enterBtn) enterBtn.style.display='none';
    if(relFirst===null) guideText.innerHTML=`[${lbl}] 첫 번째 구성원 클릭${shift}`;
    else guideText.innerHTML=`[${lbl}] 두 번째 구성원 클릭${shift}`;
  }
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ cancelRel(); return; }
  // Enter → 직계가족 연결 완료
  if(e.key==='Enter' && relMode==='family' && relParents && relParents.length>=1 && relChildren.length>=1){
    commitFamily();
  }
});

/* 가계도 저장 */
let genoTimer=null;
function saveGenogram() {
  if (!currentCaseId) return;
  const c=cases[currentCaseId]; if (!c) return;
  c.genogram = { nodes: JSON.parse(JSON.stringify(nodes)), edges: JSON.parse(JSON.stringify(edges)) };
  clearTimeout(genoTimer);
  genoTimer = setTimeout(()=>saveCaseToDB(currentCaseId), 800);
}

/* ── 렌더 ── */
function render() { renderEdges(); renderNodes(); }

function renderNodes() {
  nodesLayer.innerHTML='';
  nodes.forEach(n=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('cursor','move'); g.setAttribute('data-id',n.id);

    const fill='#fff', stroke=selected===n.id?'#2563EB':'#334155', sw=selected===n.id?'2.5':'1.8';

    if(n.ct){
      const outer=makeShape(n.sex,n.x,n.y,R+7,'none','#2563EB','2');
      g.appendChild(outer);
    }
    const shape=makeShape(n.sex,n.x,n.y,R,fill,stroke,sw);
    g.appendChild(shape);

    if(n.mark==='deceased'){
      [{x1:n.x-R*.7,y1:n.y-R*.7,x2:n.x+R*.7,y2:n.y+R*.7},{x1:n.x+R*.7,y1:n.y-R*.7,x2:n.x-R*.7,y2:n.y+R*.7}].forEach(l=>{
        const el=document.createElementNS('http://www.w3.org/2000/svg','line');
        Object.entries(l).forEach(([k,v])=>el.setAttribute(k,v));
        el.setAttribute('stroke','#64748B'); el.setAttribute('stroke-width','1.8');
        g.appendChild(el);
      });
    }
    if(n.mark==='ip'){
      const ul=document.createElementNS('http://www.w3.org/2000/svg','line');
      ul.setAttribute('x1',n.x-R); ul.setAttribute('y1',n.y+R+5);
      ul.setAttribute('x2',n.x+R); ul.setAttribute('y2',n.y+R+5);
      ul.setAttribute('stroke','#2563EB'); ul.setAttribute('stroke-width','3');
      g.appendChild(ul);
    }
    if(n.mark==='addicted'){
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',n.x); dot.setAttribute('cy',n.y); dot.setAttribute('r','7');
      dot.setAttribute('fill','#334155');
      g.appendChild(dot);
    }
    if(n.mark==='abuse'){
      const tr=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      tr.setAttribute('points',`${n.x},${n.y-8} ${n.x+9},${n.y+7} ${n.x-9},${n.y+7}`);
      tr.setAttribute('fill','#EF4444'); tr.setAttribute('opacity','0.85');
      g.appendChild(tr);
    }
    if(n.ct){
      const ct=document.createElementNS('http://www.w3.org/2000/svg','text');
      ct.setAttribute('x',n.x+R+10); ct.setAttribute('y',n.y-R+4);
      ct.setAttribute('font-size','10'); ct.setAttribute('fill','#2563EB');
      ct.setAttribute('font-weight','700'); ct.setAttribute('font-family','sans-serif');
      ct.textContent='CT';
      g.appendChild(ct);
    }
    if(relMode && relFirst===n.id){
      const hl=makeShape(n.sex,n.x,n.y,R+4,'none','#2563EB','2');
      hl.setAttribute('stroke-dasharray','4,3');
      g.appendChild(hl);
    }
    const nameY=n.y+R+(n.ct?11:7);
    if(n.name){
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',n.x); t.setAttribute('y',nameY+12);
      t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','12');
      t.setAttribute('fill','#334155'); t.setAttribute('font-family','sans-serif');
      t.textContent=n.name+(n.age?` (${n.age})`:'');
      g.appendChild(t);
    }
    if(n.note){
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',n.x); t.setAttribute('y',nameY+(n.name?27:13));
      t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','10');
      t.setAttribute('fill','#94A3B8'); t.setAttribute('font-family','sans-serif');
      t.textContent=n.note;
      g.appendChild(t);
    }

    g.addEventListener('mousedown',e=>onDown(e,n.id));
    g.addEventListener('click',e=>onClick(e,n.id));
    nodesLayer.appendChild(g);
  });
}

function makeShape(sex,x,y,r,fill,stroke,sw){
  let el;
  if(sex==='male'){
    el=document.createElementNS('http://www.w3.org/2000/svg','rect');
    el.setAttribute('x',x-r); el.setAttribute('y',y-r);
    el.setAttribute('width',r*2); el.setAttribute('height',r*2); el.setAttribute('rx','3');
  } else if(sex==='female'){
    el=document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx',x); el.setAttribute('cy',y); el.setAttribute('r',r);
  } else {
    el=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    el.setAttribute('points',`${x},${y-r} ${x+r},${y+r*.7} ${x-r},${y+r*.7}`);
  }
  el.setAttribute('fill',fill); el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw);
  return el;
}

function renderEdges(){
  edgesLayer.innerHTML='';

  /* ── family edge: 표준 가계도 형식 ──
     부모 ─── 부모
           │  (수평바)
      ┬────┴────┬
      자1      자2
  */
  edges.filter(e=>e.type==='family').forEach(fe=>{
    const parents  = (fe.parents ||[]).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
    const children = (fe.children||[]).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
    if(parents.length===0||children.length===0) return;

    // 부모 중점
    const px = parents.length===2 ? (parents[0].x+parents[1].x)/2 : parents[0].x;
    const py = parents.length===2 ? (parents[0].y+parents[1].y)/2 : parents[0].y;

    // 수직 드롭 위치 = 부모 아래 50px
    const dropY = py + 55;

    // 자녀들의 x 범위 → 수평바
    const childXs = children.map(c=>c.x);
    const hBarLeft  = Math.min(...childXs);
    const hBarRight = Math.max(...childXs);

    const lw='1.8', lc='#334155';

    // 부모 → 부모 간 연결선은 별도 edge(marriage 등)로 처리
    // 부모 중점 → 수직 드롭
    line(px, py+R+2, px, dropY, lc, lw);

    // 수평바 (자녀 2명 이상일 때만)
    if(children.length>1){
      line(hBarLeft, dropY, hBarRight, dropY, lc, lw);
    }

    // 각 자녀 위로 수직선
    children.forEach(c=>{
      line(c.x, dropY, c.x, c.y-R-2, lc, lw);
    });
  });

  /* ── 일반 edge ── */
  edges.filter(e=>e.type!=='family').forEach(e=>{
    const a=nodes.find(n=>n.id===e.a), b=nodes.find(n=>n.id===e.b);
    if(!a||!b) return;

    const cfg={
      marriage:{stroke:'#334155',sw:'2.2',dash:''},
      divorce:  {stroke:'#94A3B8',sw:'2',  dash:'8,5'},
      cohabit:  {stroke:'#94A3B8',sw:'2',  dash:'4,4'},
      close:    {stroke:'#059669',sw:'4',  dash:''},
      conflict: {stroke:'#EF4444',sw:'2',  dash:'5,4'},
      cut:      {stroke:'#94A3B8',sw:'1.5',dash:'2,6'},
    }[e.type]||{stroke:'#334155',sw:'1.5',dash:''};

    const d=`M${a.x},${a.y} L${b.x},${b.y}`;
    const p=makePath(d,cfg.stroke,cfg.sw,cfg.dash);
    edgesLayer.appendChild(p);

    if(e.type==='close'){
      edgesLayer.appendChild(makePath(d,'#fff','1.5',''));
    }
    if(e.type==='conflict'){
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      [[-7,-7,7,7],[7,-7,-7,7]].forEach(([dx1,dy1,dx2,dy2])=>{
        const xl=document.createElementNS('http://www.w3.org/2000/svg','line');
        xl.setAttribute('x1',mx+dx1);xl.setAttribute('y1',my+dy1);
        xl.setAttribute('x2',mx+dx2);xl.setAttribute('y2',my+dy2);
        xl.setAttribute('stroke','#EF4444');xl.setAttribute('stroke-width','2.5');xl.setAttribute('stroke-linecap','round');
        edgesLayer.appendChild(xl);
      });
    }
    if(['marriage','divorce','cohabit'].includes(e.type)){
      const lx=(a.x+b.x)/2, ly=(a.y+b.y)/2-9;
      const lt=svgText(lx,ly,REL_LABELS[e.type]||'','#94A3B8','10','middle');
      edgesLayer.appendChild(lt);
    }
  });

  /* ── 직계가족 모드 중 미리보기 하이라이트 ── */
  if(relMode==='family'){
    (relParents||[]).forEach(id=>{
      const n=nodes.find(n=>n.id===id); if(!n) return;
      const hl=makeShape(n.sex,n.x,n.y,R+5,'none','#2563EB','2');
      hl.setAttribute('stroke-dasharray','4,3');
      edgesLayer.appendChild(hl);
    });
    relChildren.forEach(id=>{
      const n=nodes.find(n=>n.id===id); if(!n) return;
      const hl=makeShape(n.sex,n.x,n.y,R+5,'none','#059669','2');
      hl.setAttribute('stroke-dasharray','4,3');
      edgesLayer.appendChild(hl);
    });
  }
}

function line(x1,y1,x2,y2,stroke,sw){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',sw);l.setAttribute('stroke-linecap','round');
  edgesLayer.appendChild(l); return l;
}
function makePath(d,stroke,sw,dash){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('fill','none');
  p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw);
  if(dash)p.setAttribute('stroke-dasharray',dash);
  return p;
}
function svgText(x,y,text,fill,size,anchor){
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('fill',fill);
  t.setAttribute('font-size',size);t.setAttribute('text-anchor',anchor||'middle');
  t.setAttribute('font-family','sans-serif'); t.textContent=text; return t;
}

/* 드래그 */
function svgPt(e){ const r=canvas.getBoundingClientRect(); return{x:e.clientX-r.left,y:e.clientY-r.top}; }
function onDown(e,id){ e.preventDefault();e.stopPropagation(); dragging=id;didDrag=false; const pt=svgPt(e); const n=nodes.find(n=>n.id===id); dragOffset={x:pt.x-n.x,y:pt.y-n.y}; }

canvas.addEventListener('mousemove',e=>{
  if(dragging===null) return;
  const pt=svgPt(e); const n=nodes.find(n=>n.id===dragging);
  if(n){n.x=pt.x-dragOffset.x; n.y=pt.y-dragOffset.y; didDrag=true; render();}
});
canvas.addEventListener('mouseup',()=>{ if(dragging!==null&&didDrag){saveHistory();saveGenogram();} dragging=null; });

function onClick(e,id){
  e.stopPropagation();
  if(didDrag){didDrag=false;return;}

  /* ── 직계가족 모드 ── */
  if(relMode==='family'){
    // 이미 선택된 부모/자녀면 토글 해제
    if(relParents && relParents.includes(id)){
      relParents = relParents.filter(x=>x!==id);
      updateGuide(); render(); return;
    }
    if(relChildren.includes(id)){
      relChildren = relChildren.filter(x=>x!==id);
      updateGuide(); render(); return;
    }
    // 부모가 미지정이거나 1명이면 부모로 추가 (최대 2명)
    if(!relParents){ relParents=[id]; updateGuide(); render(); return; }
    if(relParents.length<2 && relChildren.length===0){
      relParents=[...relParents, id];
      updateGuide(); render(); return;
    }
    // 부모 확정 후 자녀 추가
    relChildren=[...relChildren, id];
    updateGuide(); render(); return;
  }

  /* ── 일반 관계선 모드 ── */
  if(relMode){
    if(relFirst===null){
      relFirst=id; updateGuide(); render(); return;
    }
    if(relFirst===id){ cancelRel(); return; }
    saveHistory();
    // 중복 체크 (family 아닌 것만)
    const dup=edges.find(ex=>ex.type!=='family'&&((ex.a===relFirst&&ex.b===id)||(ex.a===id&&ex.b===relFirst)));
    if(!dup) edges.push({id:edgeId++, a:relFirst, b:id, type:relMode});
    const keepShift = shiftLock || e.shiftKey;
    if(keepShift){ relFirst=null; updateGuide(); render(); saveGenogram(); }
    else{ cancelRel(); render(); saveGenogram(); }
    return;
  }

  /* ── 일반 선택 ── */
  selected=id; openEdit(id); render();
}

/* Enter 로 직계가족 확정 */
function commitFamily(){
  if(!relParents||relParents.length<1||relChildren.length<1) return;
  saveHistory();
  edges.push({
    id: edgeId++,
    type: 'family',
    parents: [...relParents],
    children: [...relChildren],
    coupleType: 'marriage'   // 기본값; 부모 관계선으로 별도 표현
  });
  const keepShift = shiftLock;
  if(keepShift){ relParents=null; relChildren=[]; updateGuide(); render(); saveGenogram(); }
  else{ cancelRel(); render(); saveGenogram(); }
}
canvas.addEventListener('click',e=>{
  if(e.target===canvas||e.target.tagName==='svg'){
    // 직계가족 모드에서 빈 곳 클릭 = 무시 (Enter로만 확정)
    if(relMode==='family') return;
    selected=null; closeEdit();
    if(relMode && !shiftLock) cancelRel();
    render();
  }
});

/* SHIFT+클릭으로 관계선 버튼 연속모드 활성화 */
document.querySelectorAll && document.addEventListener('click', e=>{
  const btn = e.target.closest('.tool-btn-g[id^="rb-"]');
  if(btn && e.shiftKey){
    const type = btn.id.replace('rb-','');
    startRel(type, true);
    e.preventDefault();
  }
});

/* 편집 패널 */
function openEdit(id){
  const n=nodes.find(n=>n.id===id); if(!n) return;
  document.getElementById('ep-name').value=n.name||'';
  document.getElementById('ep-age').value=n.age||'';
  document.getElementById('ep-note').value=n.note||'';
  document.getElementById('ep-mark').value=n.mark||'';
  document.getElementById('ep-ct').checked=!!n.ct;
  editPanel.classList.add('show');
}
function closeEdit(){ editPanel.classList.remove('show'); selected=null; }
function updateNode(){
  const n=nodes.find(n=>n.id===selected); if(!n) return;
  n.name=document.getElementById('ep-name').value;
  n.age=document.getElementById('ep-age').value;
  n.note=document.getElementById('ep-note').value;
  n.mark=document.getElementById('ep-mark').value;
  n.ct=document.getElementById('ep-ct').checked;
  render(); saveGenogram();
}
function deleteSelectedNode(){
  if(selected===null) return; saveHistory();
  nodes=nodes.filter(n=>n.id!==selected);
  edges=edges.filter(e=>e.a!==selected&&e.b!==selected);
  closeEdit(); render(); saveGenogram();
}

/* SVG 내보내기 */
function exportSVG(){
  const c=cases[currentCaseId];
  const s=new XMLSerializer().serializeToString(canvas);
  const b=new Blob([s],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`가계도_${c?.name||'unknown'}_${new Date().toISOString().slice(0,10)}.svg`;
  a.click();
}

/* ── 시작 ── */
initData();
</script>
