<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>가계도 관리 | 공주시정신건강복지센터</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{
  --primary:#2563EB;--primary-light:#EFF6FF;--primary-dark:#1D4ED8;
  --success:#10B981;--warning:#F59E0B;--danger:#EF4444;
  --bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;--border-strong:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --r:10px;--sh:0 1px 3px rgba(0,0,0,.06);--sh-md:0 4px 16px rgba(0,0,0,.10);
  --font:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --sab:env(safe-area-inset-bottom,0px);
  --sat:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px}
button{font-family:var(--font);cursor:pointer}

/* 화면 전환 */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:10}
.screen.off-left{transform:translateX(-100%)}
.screen.off-right{transform:translateX(100%)}

/* 공통 헤더 */
.hdr{background:var(--primary);color:#fff;
  padding:calc(var(--sat) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:54px}
.hdr h1{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .sub{font-size:11px;opacity:.75;display:block;margin-top:1px}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;
  border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;white-space:nowrap}
.back-btn{background:none;border:none;color:#fff;font-size:22px;padding:2px 8px;line-height:1}

/* 하단 탭바 */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);display:flex;
  padding-bottom:var(--sab);z-index:50}
.tabb{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 6px;gap:3px;border:none;background:none;
  color:var(--text3);font-size:10px;font-weight:500}
.tabb.active{color:var(--primary)}
.tabb-icon{font-size:20px;line-height:1.2}

/* 스크롤 */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* 사례 목록 */
.case-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
  padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--sh);transition:opacity .1s}
.case-card:active{opacity:.7}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);
  color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.case-info{flex:1;min-width:0}
.case-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.case-sub{font-size:12px;color:var(--text3);margin-top:2px}
.fab{position:fixed;right:20px;bottom:calc(var(--sab) + 76px);width:56px;height:56px;
  border-radius:50%;background:var(--primary);color:#fff;font-size:28px;border:none;
  box-shadow:0 4px 16px rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;z-index:40}
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;gap:10px;color:var(--text3);padding:40px 20px;text-align:center}
.empty-icon{font-size:52px;opacity:.5}

/* 가계도 캔버스 */
#canvas-wrap{flex:1;position:relative;background:#F7F9FC;overflow:hidden;touch-action:none}
#geno-canvas{width:100%;height:100%;display:block}

/* 관계선 안내 토스트 */
#rel-toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:var(--primary);color:#fff;border-radius:20px;
  padding:8px 16px;font-size:13px;font-weight:500;display:none;z-index:30;
  box-shadow:var(--sh-md);text-align:center;max-width:90%;pointer-events:none}
#rel-toast.show{display:block}
#rel-toast-btn{display:none;margin-top:6px;background:rgba(255,255,255,.25);
  border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:12px;
  padding:5px 14px;font-size:12px;font-family:var(--font);pointer-events:all}
#cancel-rel-btn{display:none;position:absolute;top:10px;right:12px;
  background:#fff;border:1px solid var(--border-strong);border-radius:20px;
  padding:7px 14px;font-size:13px;font-weight:600;color:var(--text2);
  box-shadow:var(--sh);z-index:31}

/* 하단 드로어 */
#tool-drawer{background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
#drawer-handle{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;border:none;background:none;width:100%}
#drawer-handle .pill{width:36px;height:4px;background:var(--border-strong);border-radius:2px}
#drawer-handle span{font-size:12px;color:var(--text3);font-weight:500}
#drawer-inner{padding:12px 14px;display:none;flex-direction:column;gap:12px;
  overflow-y:auto;max-height:52vh;padding-bottom:calc(var(--sab) + 80px)}
.tg-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:5px}
.tg-row{display:flex;gap:8px;flex-wrap:wrap}
.tg-btn{flex:1;min-width:76px;max-width:110px;padding:10px 6px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;
  color:var(--text);display:flex;flex-direction:column;align-items:center;gap:5px}
.tg-btn:active{background:var(--bg)}
.tg-btn svg{width:20px;height:20px}
.tg-btn.rel-active{background:var(--primary-light);border-color:#93C5FD;color:var(--primary);font-weight:700}
.tg-btn.family-btn{background:var(--primary-light);border-color:#93C5FD;color:var(--primary);font-weight:700}
.tg-btn.full-w{max-width:none;width:100%;flex-direction:row;justify-content:center;gap:8px}
.tg-btn.danger{border-color:#FECACA;color:var(--danger);background:#FEF2F2}
.hint{font-size:11px;color:var(--text3);line-height:1.6;margin-top:4px}

/* 노드 편집 시트 */
#edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);
  transform:translateY(100%);transition:transform .3s ease;z-index:60;
  padding:16px 20px calc(var(--sab) + 16px)}
#edit-sheet.show{transform:translateY(0)}
.s-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 14px}
.s-title{font-size:15px;font-weight:700;margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center}
.s-close{background:var(--bg);border:none;border-radius:50%;width:28px;height:28px;
  font-size:15px;color:var(--text3)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.f1{margin-bottom:10px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;font-weight:600;color:var(--text2)}
.f input,.f select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface)}
.f input:focus,.f select:focus{outline:none;border-color:var(--primary)}
.ct-row{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:13px;font-weight:600;color:var(--text2)}
.ct-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 16px;border-radius:var(--r);font-size:14px;font-weight:600;
  border:1px solid transparent;font-family:var(--font)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:var(--surface);color:var(--text);border-color:var(--border-strong)}
.btn-danger{background:#FEF2F2;color:var(--danger);border-color:#FECACA}
.btn-full{width:100%}

/* 사례 정보 탭 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:600;color:var(--text2)}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:1px solid var(--border);
  border-radius:8px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary)}
.fg textarea{resize:vertical;min-height:80px}

/* 메모 */
.memo-add{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:12px}
.memo-add textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:var(--font);resize:none;height:72px;margin-bottom:8px}
.memo-add textarea:focus{outline:none;border-color:var(--primary)}
.memo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:12px;margin-bottom:8px;box-shadow:var(--sh)}
.memo-text{font-size:14px;line-height:1.65;margin-bottom:6px}
.memo-meta{display:flex;justify-content:space-between;align-items:center}
.memo-date{font-size:11px;color:var(--text3)}
.memo-del{background:none;border:none;color:var(--text3);font-size:13px;padding:2px 6px}

/* 모달 */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;
  align-items:flex-end;justify-content:center;z-index:100}
.modal-ov.show{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px 20px calc(var(--sab) + 20px);width:100%}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.mfg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.mfg label{font-size:12px;font-weight:600;color:var(--text2)}
.mfg input{padding:11px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:15px;font-family:var(--font);width:100%}
.mfg input:focus{outline:none;border-color:var(--primary)}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.modal-footer .btn{flex:1}

/* 동기화 */
#sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:#fff;
  background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;white-space:nowrap}
#sync-dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0}
#sync-dot.ok{background:var(--success)}
#sync-dot.err{background:#fca5a5}
#sync-dot.sync{background:var(--warning);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.zoom-hint{font-size:11px;color:var(--text3);text-align:center;padding:4px;flex-shrink:0}

/* 태블릿/데스크탑 */
@media(min-width:768px){
  #screen-list{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:20;transform:none!important}
  #screen-list .hdr{padding-top:16px}
  .fab{right:auto;left:204px}
  #screen-geno,#screen-info,#screen-memo{left:280px;transform:none!important}
  .tabbar{left:280px}
  #edit-sheet,#tool-drawer{left:280px}
  .modal-ov{left:280px;align-items:center}
  .modal{border-radius:16px;margin:20px;max-width:360px;width:auto}
  #drawer-inner{max-height:240px}
}
</style>
</head>
<body>

<!-- 화면1: 사례 목록 -->
<div class="screen" id="screen-list">
  <div class="hdr">
    <div style="flex:1">
      <h1>🏥 가계도 관리</h1>
      <span class="sub">공주시정신건강복지센터</span>
    </div>
    <div id="sync-pill"><div id="sync-dot"></div><span id="sync-text">연결중</span></div>
  </div>
  <div class="scroll" style="padding:8px">
    <div id="case-list">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p style="font-size:15px;font-weight:600">사례가 없습니다</p>
        <p style="font-size:13px">아래 + 버튼으로 추가하세요</p>
      </div>
    </div>
  </div>
  <button class="fab" onclick="openNewCaseModal()">+</button>
</div>

<!-- 화면2: 가계도 -->
<div class="screen off-right" id="screen-geno">
  <div class="hdr">
    <button class="back-btn" onclick="goBack()">←</button>
    <div style="flex:1;min-width:0">
      <h1 id="case-title">-</h1>
      <span class="sub" id="case-badge">-</span>
    </div>
    <button class="hdr-btn" onclick="exportSVG()" style="font-size:12px">⬇ 저장</button>
  </div>
  <div id="canvas-wrap">
    <svg id="geno-canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </svg>
    <div id="rel-toast">
      <div id="rel-toast-text">첫 번째 구성원을 탭하세요</div>
      <button id="rel-toast-btn" onclick="commitFamily()">✓ 연결 완료</button>
    </div>
    <button id="cancel-rel-btn" onclick="cancelRel()">ESC 취소</button>
  </div>
  <p class="zoom-hint">핀치: 확대/축소 &nbsp;·&nbsp; 두 손가락 드래그: 이동</p>
  <div id="tool-drawer">
    <button id="drawer-handle" onclick="toggleDrawer()">
      <div class="pill"></div>
      <span id="drawer-label">도구 열기 ▲</span>
    </button>
    <div id="drawer-inner">
      <div>
        <div class="tg-label">구성원 추가</div>
        <div class="tg-row">
          <button class="tg-btn" onclick="addNode('male')">
            <svg viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>남성
          </button>
          <button class="tg-btn" onclick="addNode('female')">
            <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>여성
          </button>
          <button class="tg-btn" onclick="addNode('unknown')">
            <svg viewBox="0 0 20 20"><polygon points="10,2 18,18 2,18" fill="none" stroke="currentColor" stroke-width="2"/></svg>성별미상
          </button>
        </div>
      </div>
      <div>
        <div class="tg-label">직계가족 연결</div>
        <div class="tg-row">
          <button class="tg-btn family-btn full-w" id="rb-family" onclick="startRel('family')">
            <svg viewBox="0 0 20 20" width="18" height="18"><rect x="1" y="1" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="15" cy="4.5" r="3.5" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="4.5" y1="8" x2="4.5" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="15" y1="8" x2="15" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="12.5" x2="19" y2="12.5" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2,1.5"/><circle cx="4.5" cy="16" r="2.5" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="16" r="2.5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
            부모+자녀 연결 ★
          </button>
        </div>
        <div class="hint">① 부모(최대 2명) 탭 → ② 자녀들 탭 → ③ 완료 버튼</div>
      </div>
      <div>
        <div class="tg-label">관계선</div>
        <div class="tg-row">
          <button class="tg-btn" id="rb-marriage" onclick="startRel('marriage')">
            <svg viewBox="0 0 24 4" width="28" height="6"><line x1="0" y1="2" x2="24" y2="2" stroke="currentColor" stroke-width="2.5"/></svg>결혼
          </button>
          <button class="tg-btn" id="rb-divorce" onclick="startRel('divorce')">
            <svg viewBox="0 0 24 4" width="28" height="6"><line x1="0" y1="2" x2="24" y2="2" stroke="currentColor" stroke-width="2.5" stroke-dasharray="6,4"/></svg>이혼
          </button>
          <button class="tg-btn" id="rb-cohabit" onclick="startRel('cohabit')">
            <svg viewBox="0 0 24 4" width="28" height="6"><line x1="0" y1="2" x2="24" y2="2" stroke="currentColor" stroke-width="2.5" stroke-dasharray="3,3"/></svg>동거
          </button>
          <button class="tg-btn" id="rb-close" onclick="startRel('close')">
            <svg viewBox="0 0 24 6" width="28" height="8"><line x1="0" y1="3" x2="24" y2="3" stroke="#059669" stroke-width="4"/><line x1="0" y1="3" x2="24" y2="3" stroke="white" stroke-width="1.5"/></svg>밀착
          </button>
          <button class="tg-btn" id="rb-conflict" onclick="startRel('conflict')">
            <svg viewBox="0 0 24 12" width="28" height="12"><line x1="0" y1="6" x2="24" y2="6" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,4"/><line x1="9" y1="1" x2="15" y2="11" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/><line x1="15" y1="1" x2="9" y2="11" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/></svg>갈등
          </button>
          <button class="tg-btn" id="rb-cut" onclick="startRel('cut')">
            <svg viewBox="0 0 24 4" width="28" height="6"><line x1="0" y1="2" x2="24" y2="2" stroke="currentColor" stroke-width="2" stroke-dasharray="2,6"/></svg>단절
          </button>
        </div>
        <div class="hint">① 관계선 선택 → ② 첫 번째 탭 → ③ 두 번째 탭</div>
      </div>
      <div>
        <div class="tg-label">편집</div>
        <div class="tg-row">
          <button class="tg-btn" onclick="undoAction()">↩<span style="font-size:11px">취소</span></button>
          <button class="tg-btn danger" onclick="clearGenogram()">🗑<span style="font-size:11px">초기화</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="tabbar">
    <button class="tabb active" onclick="switchTab('geno')"><div class="tabb-icon">🧬</div>가계도</button>
    <button class="tabb" onclick="switchTab('info')"><div class="tabb-icon">📄</div>사례정보</button>
    <button class="tabb" onclick="switchTab('memo')"><div class="tabb-icon">📝</div>메모</button>
  </div>
</div>

<!-- 화면3: 사례 정보 -->
<div class="screen off-right" id="screen-info">
  <div class="hdr">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1>📄 사례 정보</h1>
  </div>
  <div class="scroll" style="padding-bottom:calc(var(--sab) + 72px)">
    <div style="padding:16px">
      <div class="card">
        <div class="card-title">👤 기본 정보</div>
        <div class="fgrid">
          <div class="fg"><label>CT 성명</label><input id="fi-name" type="text" oninput="saveInfo()"></div>
          <div class="fg"><label>생년월일</label><input id="fi-birth" type="text" placeholder="YYYY-MM-DD" oninput="saveInfo()"></div>
          <div class="fg"><label>성별</label>
            <select id="fi-sex" onchange="saveInfo()"><option value="">선택</option><option>남</option><option>여</option></select>
          </div>
          <div class="fg"><label>연락처</label><input id="fi-tel" type="tel" oninput="saveInfo()"></div>
          <div class="fg full"><label>주소</label><input id="fi-addr" type="text" oninput="saveInfo()"></div>
          <div class="fg"><label>담당 사회복지사</label><input id="fi-sw" type="text" oninput="saveInfo()"></div>

<script>
/* Firebase */
const firebaseConfig={
  apiKey:"AIzaSyExample-replace-with-your-key",
  authDomain:"gongju-inventory.firebaseapp.com",
  databaseURL:"https://gongju-inventory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"gongju-inventory",
  storageBucket:"gongju-inventory.appspot.com",
  messagingSenderId:"000000000000",
  appId:"1:000000000000:web:0000000000000000"
};
let db=null,firebaseOK=false;
try{firebase.initializeApp(firebaseConfig);db=firebase.database();firebaseOK=true;}
catch(e){console.warn('Firebase 초기화 실패:',e);}

function setSyncStatus(s,t){
  document.getElementById('sync-dot').className=s;
  document.getElementById('sync-text').textContent=t;
}

/* 화면 전환 */
const isDesk=()=>window.innerWidth>=768;
let curTab='geno';

function goBack(){
  if(isDesk()) return;
  ['screen-geno','screen-info','screen-memo'].forEach(id=>
    document.getElementById(id).classList.add('off-right'));
  document.getElementById('screen-list').classList.remove('off-left');
}
function showCase(tab){
  curTab=tab||'geno';
  if(!isDesk()) document.getElementById('screen-list').classList.add('off-left');
  ['geno','info','memo'].forEach(t=>{
    const el=document.getElementById('screen-'+t);
    el.classList.toggle('off-right',t!==curTab);
    if(isDesk()) el.classList.remove('off-right','off-left');
  });
}
function switchTab(tab){
  curTab=tab;
  ['geno','info','memo'].forEach(t=>{
    document.getElementById('screen-'+t).classList.toggle('off-right',t!==tab);
    if(isDesk()) document.getElementById('screen-'+t).classList.remove('off-right','off-left');
  });
}
window.addEventListener('resize',()=>{
  if(isDesk()&&currentCaseId){
    ['geno','info','memo'].forEach(t=>document.getElementById('screen-'+t).classList.remove('off-right','off-left'));
    document.getElementById('screen-list').classList.remove('off-left');
  }
});

/* 사례 데이터 */
let cases={},currentCaseId=null;
function localSave(){try{localStorage.setItem('geno_cases',JSON.stringify(cases));}catch(e){}}
function localLoad(){try{const d=localStorage.getItem('geno_cases');if(d)cases=JSON.parse(d);}catch(e){}}

function initData(){
  if(firebaseOK&&db){
    setSyncStatus('sync','연결 중...');
    db.ref('genogram/cases').on('value',snap=>{
      cases=snap.val()||{};renderCaseList();setSyncStatus('ok','동기화됨');
    },()=>{firebaseOK=false;localLoad();renderCaseList();setSyncStatus('err','로컬');});
  }else{localLoad();renderCaseList();setSyncStatus('err','로컬');}
}
function saveCaseToDB(id){
  const c=cases[id];if(!c)return;
  if(firebaseOK&&db){
    setSyncStatus('sync','저장...');
    db.ref('genogram/cases/'+id).set(c).then(()=>setSyncStatus('ok','저장완료')).catch(()=>{localSave();setSyncStatus('err','로컬저장');});
  }else localSave();
}
function deleteCaseFromDB(id){
  if(firebaseOK&&db)db.ref('genogram/cases/'+id).remove();
  else{delete cases[id];localSave();}
}

function renderCaseList(){
  const el=document.getElementById('case-list');
  const ids=Object.keys(cases);
  if(!ids.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>
      <p style="font-size:15px;font-weight:600">사례가 없습니다</p>
      <p style="font-size:13px">아래 + 버튼으로 추가하세요</p></div>`;return;
  }
  el.innerHTML=ids.map(id=>{
    const c=cases[id];
    return `<div class="case-card" onclick="selectCase('${id}')">
      <div class="avatar">${(c.name||'?').slice(0,2)}</div>
      <div class="case-info">
        <div class="case-name">${c.name||'이름없음'}</div>
        <div class="case-sub">${c.sw||'담당자 미지정'} · ${c.date||''}</div>
      </div>
      <span style="color:var(--text3);font-size:20px">›</span>
    </div>`;
  }).join('');
}

function openNewCaseModal(){
  document.getElementById('nc-name').value='';
  document.getElementById('nc-sw').value='';
  document.getElementById('nc-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('new-case-modal').classList.add('show');
  setTimeout(()=>document.getElementById('nc-name').focus(),300);
}
function closeNewCaseModal(){document.getElementById('new-case-modal').classList.remove('show');}
document.getElementById('new-case-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('new-case-modal'))closeNewCaseModal();
});

function createCase(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){alert('CT 성명을 입력하세요.');return;}
  const id='case_'+Date.now();
  cases[id]={id,name,sw:document.getElementById('nc-sw').value.trim(),
    date:document.getElementById('nc-date').value,info:{},memos:[],genogram:{nodes:[],edges:[]}};
  saveCaseToDB(id);closeNewCaseModal();selectCase(id);
}

function selectCase(id){currentCaseId=id;renderCaseList();loadCaseView();}
function loadCaseView(){
  const c=cases[currentCaseId];if(!c)return;
  document.getElementById('case-title').textContent=c.name||'이름없음';
  document.getElementById('case-badge').textContent=c.sw||'담당자 미지정';
  const info=c.info||{};
  ['name','birth','sex','tel','addr','sw','date','diag','svc','reason','summary'].forEach(k=>{
    const el=document.getElementById('fi-'+k);if(el)el.value=info[k]||'';
  });
  const g=c.genogram||{nodes:[],edges:[]};
  nodes=JSON.parse(JSON.stringify(g.nodes||[]));
  edges=JSON.parse(JSON.stringify(g.edges||[]));
  nodeId=nodes.reduce((m,n)=>Math.max(m,n.id+1),0);
  edgeId=edges.reduce((m,e)=>Math.max(m,e.id+1),0);
  history=[];cancelRel();closeEdit();
  vpX=0;vpY=0;vpScale=1;
  render();renderMemos();showCase('geno');
}

let infoTimer=null;
function saveInfo(){
  if(!currentCaseId)return;
  const c=cases[currentCaseId];if(!c)return;
  if(!c.info)c.info={};
  ['name','birth','sex','tel','addr','sw','date','diag','svc','reason','summary'].forEach(k=>{
    const el=document.getElementById('fi-'+k);if(el)c.info[k]=el.value;
  });
  clearTimeout(infoTimer);infoTimer=setTimeout(()=>saveCaseToDB(currentCaseId),1200);
}

/* 메모 */
function addMemo(){
  const txt=document.getElementById('memo-input').value.trim();
  if(!txt||!currentCaseId)return;
  const c=cases[currentCaseId];if(!c.memos)c.memos=[];
  c.memos.unshift({id:Date.now(),text:txt,date:new Date().toLocaleString('ko-KR')});
  document.getElementById('memo-input').value='';
  saveCaseToDB(currentCaseId);renderMemos();
}
function deleteMemo(mid){
  const c=cases[currentCaseId];if(!c)return;
  c.memos=(c.memos||[]).filter(m=>m.id!==mid);
  saveCaseToDB(currentCaseId);renderMemos();
}
function renderMemos(){
  const c=cases[currentCaseId];if(!c)return;
  const list=c.memos||[];
  document.getElementById('memo-list').innerHTML=list.length
    ?list.map(m=>`<div class="memo-item">
        <div class="memo-text">${m.text.replace(/\n/g,'<br>')}</div>
        <div class="memo-meta">
          <span class="memo-date">${m.date}</span>
          <button class="memo-del" onclick="deleteMemo(${m.id})">🗑 삭제</button>
        </div></div>`).join('')
    :'<p style="color:var(--text3);font-size:13px;text-align:center;padding:20px">메모가 없습니다.</p>';
}

/* 드로어 */
let drawerOpen=false;
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  const inner=document.getElementById('drawer-inner');
  inner.style.display=drawerOpen?'flex':'none';
  document.getElementById('drawer-label').textContent=drawerOpen?'도구 닫기 ▼':'도구 열기 ▲';
}

/* 가계도 엔진 */
const canvas=document.getElementById('geno-canvas');
const nodesLayer=document.getElementById('nodes-layer');
const edgesLayer=document.getElementById('edges-layer');

let nodes=[],edges=[],selected=null;
let dragging=null,dragOffset={x:0,y:0},didDrag=false;
let relMode=null,relFirst=null,relParents=null,relChildren=[];
let history=[],nodeId=0,edgeId=0;
const R=24;
let vpX=0,vpY=0,vpScale=1;

const REL_LABELS={family:'직계가족',marriage:'결혼',divorce:'이혼',cohabit:'동거',close:'밀착',conflict:'갈등',cut:'단절'};

function saveHistory(){history.push({n:JSON.stringify(nodes),e:JSON.stringify(edges)});}
function undoAction(){
  if(!history.length)return;
  const s=history.pop();nodes=JSON.parse(s.n);edges=JSON.parse(s.e);
  nodeId=nodes.reduce((m,n)=>Math.max(m,n.id+1),0);
  edgeId=edges.reduce((m,e)=>Math.max(m,e.id+1),0);
  render();saveGenogram();
}
function clearGenogram(){
  if(!confirm('가계도를 초기화하시겠습니까?'))return;
  saveHistory();nodes=[];edges=[];nodeId=0;edgeId=0;
  closeEdit();render();saveGenogram();
}

function addNode(sex){
  if(!currentCaseId)return;
  saveHistory();
  const wrap=document.getElementById('canvas-wrap');
  const cx=(wrap.clientWidth/2-vpX)/vpScale;
  const cy=(wrap.clientHeight/2-vpY)/vpScale;
  nodes.push({id:nodeId++,sex,x:cx+(Math.random()-.5)*100,y:cy+(Math.random()-.5)*100,name:'',age:'',note:'',mark:'',ct:false});
  render();saveGenogram();
  if(drawerOpen)toggleDrawer();
}

/* 관계선 모드 */
function startRel(type){
  relMode=type;relFirst=null;relParents=null;relChildren=[];
  document.querySelectorAll('.tg-btn').forEach(b=>b.classList.remove('rel-active'));
  document.getElementById('rb-'+type)?.classList.add('rel-active');
  updateToast();
  document.getElementById('rel-toast').classList.add('show');
  document.getElementById('cancel-rel-btn').style.display='block';
  if(drawerOpen)toggleDrawer();
  closeEdit();
}
function cancelRel(){
  relMode=null;relFirst=null;relParents=null;relChildren=[];
  document.querySelectorAll('.tg-btn').forEach(b=>b.classList.remove('rel-active'));
  document.getElementById('rel-toast').classList.remove('show');
  document.getElementById('cancel-rel-btn').style.display='none';
  render();
}
function updateToast(){
  const lbl=REL_LABELS[relMode]||relMode;
  const btn=document.getElementById('rel-toast-btn');
  if(relMode==='family'){
    const ok=relParents&&relParents.length>=1&&relChildren.length>=1;
    btn.style.display=ok?'block':'none';
    let msg;
    if(!relParents)msg='[직계가족] 부모를 탭하세요 (최대 2명)';
    else if(relParents.length===1&&relChildren.length===0)msg='두 번째 부모 또는 자녀를 탭하세요';
    else if(relChildren.length===0)msg='자녀를 탭하세요 (여러 명 가능)';
    else msg=`자녀 ${relChildren.length}명 선택됨 — 더 탭하거나 완료`;
    document.getElementById('rel-toast-text').textContent=msg;
  }else{
    btn.style.display='none';
    document.getElementById('rel-toast-text').textContent=
      relFirst===null?`[${lbl}] 첫 번째 구성원을 탭하세요`:`[${lbl}] 두 번째 구성원을 탭하세요`;
  }
}
function commitFamily(){
  if(!relParents||relParents.length<1||relChildren.length<1)return;
  saveHistory();
  edges.push({id:edgeId++,type:'family',parents:[...relParents],children:[...relChildren]});
  cancelRel();render();saveGenogram();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')cancelRel();
  if(e.key==='Enter'&&relMode==='family')commitFamily();
});

let genoTimer=null;
function saveGenogram(){
  if(!currentCaseId)return;
  const c=cases[currentCaseId];if(!c)return;
  c.genogram={nodes:JSON.parse(JSON.stringify(nodes)),edges:JSON.parse(JSON.stringify(edges))};
  clearTimeout(genoTimer);genoTimer=setTimeout(()=>saveCaseToDB(currentCaseId),800);
}

/* 좌표 변환 */
function clientToCanvas(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:(cx-r.left-vpX)/vpScale,y:(cy-r.top-vpY)/vpScale};
}
function applyViewport(){
  const tf=`translate(${vpX},${vpY}) scale(${vpScale})`;
  nodesLayer.setAttribute('transform',tf);
  edgesLayer.setAttribute('transform',tf);
}

/* 렌더 */
function render(){renderEdges();renderNodes();applyViewport();}

function svgEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;
}
function svgTxt(x,y,text,fill,size,anchor){
  const t=svgEl('text',{x,y,fill,'font-size':size,'text-anchor':anchor,'font-family':'sans-serif'});
  t.textContent=text;return t;
}
function makeShape(sex,x,y,r,fill,stroke,sw){
  if(sex==='male') return svgEl('rect',{x:x-r,y:y-r,width:r*2,height:r*2,rx:'3',fill,stroke,'stroke-width':sw});
  if(sex==='female') return svgEl('circle',{cx:x,cy:y,r,fill,stroke,'stroke-width':sw});
  return svgEl('polygon',{points:`${x},${y-r} ${x+r},${y+r*.7} ${x-r},${y+r*.7}`,fill,stroke,'stroke-width':sw});
}
function addLine(x1,y1,x2,y2,stroke,sw){
  edgesLayer.appendChild(svgEl('line',{x1,y1,x2,y2,stroke,'stroke-width':sw,'stroke-linecap':'round'}));
}
function makePath(d,stroke,sw,dash){
  const p=svgEl('path',{d,fill:'none',stroke,'stroke-width':sw});
  if(dash)p.setAttribute('stroke-dasharray',dash);return p;
}

function renderNodes(){
  nodesLayer.innerHTML='';
  nodes.forEach(n=>{
    const g=svgEl('g',{'data-id':n.id});
    const isSel=selected===n.id;
    const isPar=relMode==='family'&&relParents&&relParents.includes(n.id);
    const isChild=relMode==='family'&&relChildren.includes(n.id);
    const isFirst=relMode&&relMode!=='family'&&relFirst===n.id;

    if(n.ct) g.appendChild(makeShape(n.sex,n.x,n.y,R+8,'none','#2563EB','2'));
    if(isPar){const h=makeShape(n.sex,n.x,n.y,R+6,'none','#2563EB','2.5');h.setAttribute('stroke-dasharray','5,3');g.appendChild(h);}
    if(isChild){const h=makeShape(n.sex,n.x,n.y,R+6,'none','#059669','2.5');h.setAttribute('stroke-dasharray','5,3');g.appendChild(h);}
    if(isFirst){const h=makeShape(n.sex,n.x,n.y,R+6,'none','#2563EB','2.5');h.setAttribute('stroke-dasharray','5,3');g.appendChild(h);}

    g.appendChild(makeShape(n.sex,n.x,n.y,R,'#fff',isSel?'#2563EB':'#334155',isSel?'2.5':'1.8'));

    if(n.mark==='deceased'){
      [[-1,-1,1,1],[1,-1,-1,1]].forEach(([dx1,dy1,dx2,dy2])=>{
        g.appendChild(svgEl('line',{x1:n.x+dx1*R*.7,y1:n.y+dy1*R*.7,x2:n.x+dx2*R*.7,y2:n.y+dy2*R*.7,stroke:'#64748B','stroke-width':'2'}));
      });
    }
    if(n.mark==='ip') g.appendChild(svgEl('line',{x1:n.x-R,y1:n.y+R+5,x2:n.x+R,y2:n.y+R+5,stroke:'#2563EB','stroke-width':'3.5','stroke-linecap':'round'}));
    if(n.mark==='addicted') g.appendChild(svgEl('circle',{cx:n.x,cy:n.y,r:'8',fill:'#334155'}));
    if(n.mark==='abuse') g.appendChild(svgEl('polygon',{points:`${n.x},${n.y-9} ${n.x+10},${n.y+8} ${n.x-10},${n.y+8}`,fill:'#EF4444',opacity:'.85'}));
    if(n.ct){const t=svgTxt(n.x+R+10,n.y-R+4,'CT','#2563EB','11','start');t.setAttribute('font-weight','700');g.appendChild(t);}

    const ny=n.y+R+(n.ct?12:8);
    if(n.name) g.appendChild(svgTxt(n.x,ny+13,n.name+(n.age?` (${n.age})`:  ''),'#334155','13','middle'));
    if(n.note) g.appendChild(svgTxt(n.x,ny+(n.name?29:13),n.note,'#94A3B8','11','middle'));

    g.addEventListener('pointerdown',e=>onPointerDownNode(e,n.id),{passive:false});
    nodesLayer.appendChild(g);
  });
}

function renderEdges(){
  edgesLayer.innerHTML='';
  edges.filter(e=>e.type==='family').forEach(fe=>{
    const pars=(fe.parents||[]).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
    const chs=(fe.children||[]).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
    if(!pars.length||!chs.length)return;
    const px=pars.length===2?(pars[0].x+pars[1].x)/2:pars[0].x;
    const py=pars.length===2?(pars[0].y+pars[1].y)/2:pars[0].y;
    const dropY=py+58;
    const cxs=chs.map(c=>c.x);
    addLine(px,py+R+2,px,dropY,'#334155','1.8');
    if(chs.length>1)addLine(Math.min(...cxs),dropY,Math.max(...cxs),dropY,'#334155','1.8');
    chs.forEach(c=>addLine(c.x,dropY,c.x,c.y-R-2,'#334155','1.8'));
  });
  edges.filter(e=>e.type!=='family').forEach(e=>{
    const a=nodes.find(n=>n.id===e.a),b=nodes.find(n=>n.id===e.b);
    if(!a||!b)return;
    const cfg={
      marriage:{s:'#334155',w:'2.2',d:''},divorce:{s:'#94A3B8',w:'2',d:'8,5'},
      cohabit:{s:'#94A3B8',w:'2',d:'4,4'},close:{s:'#059669',w:'4',d:''},
      conflict:{s:'#EF4444',w:'2',d:'5,4'},cut:{s:'#94A3B8',w:'1.5',d:'2,6'},
    }[e.type]||{s:'#334155',w:'1.5',d:''};
    edgesLayer.appendChild(makePath(`M${a.x},${a.y}L${b.x},${b.y}`,cfg.s,cfg.w,cfg.d));
    if(e.type==='close') edgesLayer.appendChild(makePath(`M${a.x},${a.y}L${b.x},${b.y}`,'#fff','1.5',''));
    if(e.type==='conflict'){
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      [[-7,-7,7,7],[7,-7,-7,7]].forEach(([x1,y1,x2,y2])=>{
        edgesLayer.appendChild(svgEl('line',{x1:mx+x1,y1:my+y1,x2:mx+x2,y2:my+y2,stroke:'#EF4444','stroke-width':'2.5','stroke-linecap':'round'}));
      });
    }
    if(['marriage','divorce','cohabit'].includes(e.type))
      edgesLayer.appendChild(svgTxt((a.x+b.x)/2,(a.y+b.y)/2-10,REL_LABELS[e.type],'#94A3B8','11','middle'));
  });
}

/* 포인터 이벤트 (터치 + 마우스 통합) */
let activePtrId=null,ptrMoved=false;

function onPointerDownNode(e,id){
  e.preventDefault();e.stopPropagation();
  if(e.touches&&e.touches.length>1)return; // 멀티터치면 무시
  activePtrId=e.pointerId;
  ptrMoved=false;
  const pt=clientToCanvas(e.clientX,e.clientY);
  dragging=id;didDrag=false;
  const n=nodes.find(n=>n.id===id);
  dragOffset={x:pt.x-n.x,y:pt.y-n.y};
}
canvas.addEventListener('pointermove',e=>{
  if(dragging===null)return;
  if(e.pointerId!==undefined&&activePtrId!==null&&e.pointerId!==activePtrId)return;
  ptrMoved=true;
  const pt=clientToCanvas(e.clientX,e.clientY);
  const n=nodes.find(n=>n.id===dragging);
  if(n){n.x=pt.x-dragOffset.x;n.y=pt.y-dragOffset.y;didDrag=true;render();}
},{passive:true});
canvas.addEventListener('pointerup',e=>{
  if(dragging!==null){
    if(didDrag){saveHistory();saveGenogram();}
    else onNodeTap(e,dragging);
    dragging=null;didDrag=false;activePtrId=null;
  }else if(!ptrMoved){
    selected=null;closeEdit();render();
  }
  ptrMoved=false;
},{passive:true});

function onNodeTap(e,id){
  if(relMode==='family'){
    if(relParents&&relParents.includes(id)){relParents=relParents.filter(x=>x!==id);updateToast();render();return;}
    if(relChildren.includes(id)){relChildren=relChildren.filter(x=>x!==id);updateToast();render();return;}
    if(!relParents){relParents=[id];updateToast();render();return;}
    if(relParents.length<2&&relChildren.length===0){relParents=[...relParents,id];updateToast();render();return;}
    relChildren=[...relChildren,id];updateToast();render();return;
  }
  if(relMode){
    if(relFirst===null){relFirst=id;updateToast();render();return;}
    if(relFirst===id){cancelRel();return;}
    saveHistory();
    const dup=edges.find(ex=>ex.type!=='family'&&((ex.a===relFirst&&ex.b===id)||(ex.a===id&&ex.b===relFirst)));
    if(!dup)edges.push({id:edgeId++,a:relFirst,b:id,type:relMode});
    cancelRel();render();saveGenogram();return;
  }
  selected=id;openEdit(id);render();
}

/* 핀치줌 + 팬 */
let tc=[],pinchD0=0,pinchScale0=1,pinchMid0={x:0,y:0},pinchVp0={x:0,y:0};
let panT0=null,panVp0={x:0,y:0};

canvas.addEventListener('touchstart',e=>{
  tc=[...e.touches];
  if(tc.length===2){
    dragging=null;
    pinchD0=Math.hypot(tc[1].clientX-tc[0].clientX,tc[1].clientY-tc[0].clientY);
    pinchScale0=vpScale;
    const r=canvas.getBoundingClientRect();
    pinchMid0={x:(tc[0].clientX+tc[1].clientX)/2-r.left,y:(tc[0].clientY+tc[1].clientY)/2-r.top};
    pinchVp0={x:vpX,y:vpY};
  }else if(tc.length===1&&dragging===null){
    panT0={x:tc[0].clientX,y:tc[0].clientY};panVp0={x:vpX,y:vpY};
  }
},{passive:true});

canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    const ns=Math.max(.3,Math.min(3,pinchScale0*(d/pinchD0)));
    const r=canvas.getBoundingClientRect();
    const mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,
               y:(e.touches[0].clientY+e.touches[1].clientY)/2-r.top};
    const ratio=ns/pinchScale0;
    vpX=pinchMid0.x-ratio*(pinchMid0.x-pinchVp0.x)+(mid.x-pinchMid0.x);
    vpY=pinchMid0.y-ratio*(pinchMid0.y-pinchVp0.y)+(mid.y-pinchMid0.y);
    vpScale=ns;applyViewport();
  }else if(e.touches.length===1&&dragging===null&&panT0){
    ptrMoved=true;
    vpX=panVp0.x+(e.touches[0].clientX-panT0.x);
    vpY=panVp0.y+(e.touches[0].clientY-panT0.y);
    applyViewport();
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{panT0=null;},{passive:true});

/* 마우스 팬 + 휠줌 (데스크탑) */
let mPan=false,mPanStart=null,mPanVp=null;
canvas.addEventListener('mousedown',e=>{
  if(dragging!==null||e.button!==0)return;
  mPan=true;mPanStart={x:e.clientX,y:e.clientY};mPanVp={x:vpX,y:vpY};
});
canvas.addEventListener('mousemove',e=>{
  if(mPan&&dragging===null){
    ptrMoved=true;vpX=mPanVp.x+(e.clientX-mPanStart.x);vpY=mPanVp.y+(e.clientY-mPanStart.y);applyViewport();
  }
});
canvas.addEventListener('mouseup',()=>{mPan=false;});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?.9:1.1;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.max(.3,Math.min(3,vpScale*d));
  const ratio=ns/vpScale;
  vpX=mx-ratio*(mx-vpX);vpY=my-ratio*(my-vpY);vpScale=ns;applyViewport();
},{passive:false});

/* 편집 시트 */
function openEdit(id){
  const n=nodes.find(n=>n.id===id);if(!n)return;
  document.getElementById('ep-name').value=n.name||'';
  document.getElementById('ep-age').value=n.age||'';
  document.getElementById('ep-note').value=n.note||'';
  document.getElementById('ep-mark').value=n.mark||'';
  document.getElementById('ep-ct').checked=!!n.ct;
  document.getElementById('edit-sheet').classList.add('show');
}
function closeEdit(){document.getElementById('edit-sheet').classList.remove('show');selected=null;}
function updateNode(){
  const n=nodes.find(n=>n.id===selected);if(!n)return;
  n.name=document.getElementById('ep-name').value;
  n.age=document.getElementById('ep-age').value;
  n.note=document.getElementById('ep-note').value;
  n.mark=document.getElementById('ep-mark').value;
  n.ct=document.getElementById('ep-ct').checked;
  render();saveGenogram();
}
function deleteSelectedNode(){
  if(selected===null)return;
  if(!confirm('이 구성원을 삭제하시겠습니까?'))return;
  saveHistory();
  nodes=nodes.filter(n=>n.id!==selected);
  edges=edges.filter(e=>e.a!==selected&&e.b!==selected
    &&!(e.type==='family'&&(e.parents||[]).includes(selected))
    &&!(e.type==='family'&&(e.children||[]).includes(selected)));
  closeEdit();render();saveGenogram();
}
document.addEventListener('pointerdown',e=>{
  const sh=document.getElementById('edit-sheet');
  if(sh.classList.contains('show')&&!sh.contains(e.target))closeEdit();
});

/* SVG 내보내기 */
function exportSVG(){
  const c=cases[currentCaseId];
  [nodesLayer,edgesLayer].forEach(l=>l.setAttribute('transform',''));
  const s=new XMLSerializer().serializeToString(canvas);
  [nodesLayer,edgesLayer].forEach(l=>l.setAttribute('transform',`translate(${vpX},${vpY}) scale(${vpScale})`));
  const b=new Blob([s],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`가계도_${c?.name||'unknown'}_${new Date().toISOString().slice(0,10)}.svg`;
  a.click();
}

initData();
